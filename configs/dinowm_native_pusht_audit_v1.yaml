dino_encoder:
  name: dinov2_vits14
  feature_key: x_norm_patchtokens
  repo_url: https://github.com/facebookresearch/dinov2.git
  repo_path: outputs/dinowm_native_pusht_audit_v1/vendor/dinov2
  revision: 7764ea0f912e53c92e82eb78a2a1631e92725fc8
