cue_residual_target:
  dimension: 192
  cue_summary: mean frozen z[t] for cue_on <= t < cue_off
  scene_baseline: 0.5 * (z[cue_on-1] + z[cue_off])
  residual: cue_summary - scene_baseline
  interpolation_equivalence: mean linear interpolation between immediate pre-cue and post-cue endpoints
  standardization: per-coordinate training-cache mean and population standard deviation
  scale_floor: 0.000001
  target_gradient: stop_gradient
  repair_head: Linear(192,192)
  read: prior_read[:,63] before consuming z[:,63]
  forbidden_inputs: [xi, "z[:,63]", validation optimization, development normalization in formal training]

development_health:
  source: fresh-a cache used as unlabeled development only
  labels_loaded: false
  formal_training_performed: false
  required_episodes: 240
  cue_duration_min: 4
  cue_duration_max: 6
  coordinate_std_min: 0.05
  coordinate_std_fraction_min: 1.0
  median_episode_residual_rms_min: 0.1
  median_episode_residual_rms_max: 10.0
  all_target_indices_before_decision: true
  policy: Every task must pass before any formal repair cell starts.

formal_repair:
  arms: [gru, ssm]
  conditions: [objective-off, cue-residual-repair]
  checkpoint_seeds: [0, 1, 2, 3, 4]
  initialization: authenticated original parent carrier checkpoint
  epochs: 20
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.00001
  next_latent_weight: 1.0
  cue_residual_weight:
    objective-off: 0.0
    cue-residual-repair: 1.0
  next_latent_windows_per_batch: 8
  gradient_clip_norm: 1.0
  optimizer: AdamW
  scheduler: CosineAnnealingLR
  torch_seed_base: 170000
  batch_plan_seed_base: 270000
  pairing: Twins share parent state, head initialization, batch order, next-latent windows, optimizer, and schedule.

formal_endpoints:
  primary_diagnostic: validation cue-residual MSE normalized by the training-mean zero-predictor MSE
  paired_contrast: objective-off MSE minus cue-residual-repair MSE
  secondary:
    - validation next-latent MSE
    - cue-residual R2 relative to the training-mean zero predictor
  diagnostic_support_rule: paired crossed-bootstrap 95% lower bound of residual-MSE reduction exceeds zero and repaired mean normalized MSE is below 1
  bootstrap_draws: 20000
  bootstrap_seed: 20260708

output:
  root: outputs/paper_a_delayed_repair_residual_v2
  development: outputs/paper_a_delayed_repair_residual_v2/development
