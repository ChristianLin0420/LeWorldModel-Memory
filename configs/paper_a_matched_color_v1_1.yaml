# Admission-informed Wave 1.1 matched-color audit. This is a new protocol,
# declared after both prior global screens stopped and before any Wave 1.1
# admission or carrier outcome. Prior admissions select the estimand; they are
# never reused for Wave 1.1 inference.
schema_version: 1
study: paper-a-matched-color-v1-1
protocol_status: admission-informed-locked-before-formal-outcomes
implementation_lock: configs/paper_a_matched_color_v1_1.lock.json

hosts: [reacher, pusht]
targets: [color]
ages: [4, 8, 15]
arms: [none, gru, lstm, ssm, fixed_trust]
seeds: [0, 1, 2, 3, 4]

adaptive_origin:
  deterministic_selection_rule: retain the unique Wave-1 target admitted at every registered age on both Reacher and PushT; keep its other factor as an exact-balanced nuisance
  selected_target: color
  retained_nuisance: location
  selection_evidence: Wave-1 color passed every age on Reacher and PushT while location failed every age on both hosts
  tworoom_boundary: TwoRoom is preserved as a stopped prerequisite in both prior screens and is not counted as a Wave 1.1 carrier environment
  timing: declared after both prior admission screens and before every Wave 1.1 admission or carrier outcome
  prior_carrier_outcomes_observed: false
  prior_admission_metrics_used_for_selection: true
  prior_admission_metrics_used_for_wave1_1_inference: false
  preserve_both_prior_failures: true
  limitation: this adaptive matched-cue comparison reduces cue-semantic and evidence-age confounding but does not isolate checkpoint identity from environment, visual background, dynamics, or training distribution
  hdf_exclusion_policy: union episode_index from identity-verified train and validation base caches of paper-a-matched-host-v1 and paper-a-matched-token-v1, pinned with sidecars and host receipts at Wave 1.1 seal time
  reacher_rng_exclusion_policy: new train and validation RNG seeds must be disjoint from both prior screens and all three seed registries are hash-pinned at Wave 1.1 seal time
  prior_screens:
    matched_host_v1:
      spec: {path: configs/paper_a_matched_host_v1.yaml, size: 7649, sha256: 5febf1c31d8a9f73c83a4d26ba4ed0f9934a23e6099840e50ceba32b4b740b7f}
      sidecar: {path: configs/paper_a_matched_host_v1.sha256, size: 95, sha256: 73a653b76a92ed016d075c4cde7ac57cc43c9d3fae28cbabb14c7a23023eade3}
      implementation_lock: {path: configs/paper_a_matched_host_v1.lock.json, size: 3461, sha256: 83c2ae48ea53e2080606fa7e15e30339668deb338fd556527025e9418b076998}
      receipts:
        reacher: {path: outputs/paper_a_matched_host_v1/cache/reacher/manifest.json, size: 22068, sha256: e7d445bbdeb7559ee7af6b3476783339f6f4c344165d8948caae89d26a20eedd}
        pusht: {path: outputs/paper_a_matched_host_v1/cache/pusht/manifest.json, size: 22143, sha256: ebc40b8475053d733c5ef85683e420799d8eb925740a3096060082ebdf78b122}
        tworoom: {path: outputs/paper_a_matched_host_v1/cache/tworoom/manifest.json, size: 22213, sha256: 717000de4420229a6118edd3e3e333ac0bfd8b209f869aa0774499349ff79237}
    matched_token_v1:
      spec: {path: configs/paper_a_matched_token_v1.yaml, size: 8965, sha256: b279ffaa89b63d9c1994799cd1fe01039f2ac0fb70243986a6c6858ed188ebd3}
      sidecar: {path: configs/paper_a_matched_token_v1.sha256, size: 96, sha256: 7a756ec9acecca67647ff3b9a27c3dc90d415a36b43d2b1479d7db4a95cbfa90}
      implementation_lock: {path: configs/paper_a_matched_token_v1.lock.json, size: 53736, sha256: 025be77f9f40173778fde41759a5e7d6b5a24ee41cf7d604d6e459285c4a224b}
      receipts:
        reacher: {path: outputs/paper_a_matched_token_v1/cache/reacher/manifest.json, size: 76668, sha256: 07559394a59ffb3403a5d0093acb5265bac66e221e416d28cab610cc285cbfdf}
        pusht: {path: outputs/paper_a_matched_token_v1/cache/pusht/manifest.json, size: 77066, sha256: 3b70b61c561b49be3b3da2afc583b023679624d2680656135956342bd9fd805e}
        tworoom: {path: outputs/paper_a_matched_token_v1/cache/tworoom/manifest.json, size: 76525, sha256: df7acb85cb26b46a057c1c22e34a5aaa7f14394d9c1eab904f4d2164c8c58405}

execution:
  allowed_devices: ["cuda:0"]
  default_device: "cuda:0"
  physical_gpu: 0
  explicit_execute_required: true
  deterministic_algorithms: true
  forbid_cuda3: true

inputs:
  reacher:
    kind: fresh-dm-control-reacher-easy
    repo_id: quentinll/lewm-reacher
    model_revision: 62adae4b71dc474ddf8f794c476ebfe737a743ca
    identity_records: [weights]
    weights: {path: outputs/paper_a_expansion/pretrained/lewm-reacher/weights.pt, size: 72290849, sha256: eb70b1fd5409f8f81875d62f5ee5a20dd220a3128a477de66b5760f475f0f469}
    train_base_seed: 20261041
    validation_base_seed: 20261042
    prior_seed_pairs: [[20260741, 20260742], [20260941, 20260942]]
    raw_frame_size: 64
    target_alpha_zero: true
  pusht:
    kind: official-root-hdf5
    repo_id: quentinll/lewm-pusht
    model_revision: 22b330c28c27ead4bfd1888615af1340e3fe9052
    dataset_revision: 655cd446b9929369d7d406001da85c15d1457850
    identity_records: [config, weights, dataset]
    bundle_path: outputs/paper_a_strengthening/pretrained/lewm-pusht
    config: {path: outputs/paper_a_strengthening/pretrained/lewm-pusht/config.json, size: 1313, sha256: 2564086e961e7b5c7c04dffc451091115b389a590645ff19653c64fd0bc16e09}
    weights: {path: outputs/paper_a_strengthening/pretrained/lewm-pusht/weights.pt, size: 72290721, sha256: 48938400ae3464c9680731287f583a9cb516f55a8ec64ea13a91be47fb15b607}
    dataset: {path: outputs/paper_a_strengthening/data/pusht_expert_train.h5, size: 46300921856, sha256: b6ebd9ac94bbe9e383f6e7a9cd92d74e9aa665ea57b758ed3717b0ee7df8d4fb}
    state_key: state
    split_seed: 20261051
    start_seed: 20261052
    prior_base_cache_paths:
      - outputs/paper_a_matched_host_v1/cache/pusht/base/train.npz
      - outputs/paper_a_matched_host_v1/cache/pusht/base/validation.npz
      - outputs/paper_a_matched_token_v1/cache/pusht/base/train.npz
      - outputs/paper_a_matched_token_v1/cache/pusht/base/validation.npz

sequence:
  num_frames: 20
  frame_skip: 5
  decision_index: 19
  cue_length: 3
  cue_intervals: {age-4: [12, 15], age-8: [8, 11], age-15: [1, 4]}
  predictor_history: 3
  endpoint_history: 3
  endpoint_feature: concat(z[16],z[17],z[18],prior_read[19])
  current_observation_excluded: true

selection:
  train_episodes: 1200
  validation_episodes: 480
  one_sequence_per_episode: true
  episode_disjoint_splits: true
  exclude_all_prior_hdf_episode_indices_before_permutation: true
  train_label_seed: 20261031
  validation_label_seed: 20261032

cue:
  colors: 4
  locations: 4
  target: color
  location_role: exact-balanced randomized nuisance
  rgb_palette: [[230, 57, 70], [40, 160, 84], [45, 108, 223], [239, 174, 45]]
  normalized_centers: [[0.18, 0.18], [0.82, 0.18], [0.18, 0.82], [0.82, 0.82]]
  square_side_fraction: 0.20
  all_16_combinations_exactly_balanced: true
  labels_independent_of_base_episode: true
  offcue_bytes_identical: true

action_normalization:
  source: all finite raw two-dimensional training-source actions per host
  ddof: 1
  order: normalize each raw 2-D action then time-major flatten five actions to 10-D

admission:
  chance: 0.25
  cue_balanced_accuracy_min: 0.75
  cue_min_class_recall_min: 0.70
  shortcut_ceiling: 0.30
  shortcut_features:
    final_context_latent: concat(z[16],z[17],z[18])
    final_action: concat(a[15],a[16],a[17],a[18])
    final_state: state[19]
  all_hosts_ages_must_pass: true
  no_carrier_training_if_any_gate_fails: true
  frozen_host_hash_required: true

carrier_training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.00001
  scheduler: cosine-annealing
  gradient_clip_norm: 1.0
  windows_per_episode: 8
  training_rng_offset: 571000
  age_balanced_mixture: true
  frozen_encoder: true
  frozen_predictor: true

readout: {model: StandardScaler+LogisticRegression, logistic_c: 1.0, solver: lbfgs, max_iter: 4000, random_state: 0, metric: balanced_accuracy, separate_readout_per_age: true}

statistics:
  bootstrap_draws: 20000
  bootstrap_seed: 20261021
  confidence: 0.95
  interval: percentile
  seed_resampling: jointly resample carrier seed indices across hosts
  episode_resampling: independently by host and stratified by 16-way joint label
  preserve_pairing: ages and arms within host
  equivalence_margin: 0.05
  primary_interaction: age-15 PushT-minus-Reacher difference in fixed-trust-minus-SSM color balanced accuracy
  nuisance_location_summary: per-location accuracy and worst-location accuracy for every host-arm-age cell
  no_pooled_host_memory_score: true

cache: {frame_batch_size: 128, compression_level: 1, store_base_and_cue_separately: true}

outputs:
  root: outputs/paper_a_matched_color_v1_1
  cache: outputs/paper_a_matched_color_v1_1/cache
  carriers: outputs/paper_a_matched_color_v1_1/carriers
  logs: outputs/paper_a_matched_color_v1_1/logs
