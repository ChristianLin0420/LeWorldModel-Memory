task:
  key: transient-four-goal-recall
  semantic_name: PointMaze transient four-goal recall
  classes: 4
  chance: 0.25
  labels: [upper-left, upper-right, lower-left, lower-right]
  goal_waypoints: [[1.0, 1.0], [1.0, 3.0], [3.0, 1.0], [3.0, 3.0]]
  counterfactual_design: each native base window is repeated under every label
  target_source: cue card only
  cue_visual: fixed U-maze mini-map with one position-varying red goal dot
  cue_card_box_yxhw: [8, 8, 72, 72]
  label_specific_color_forbidden: true

sequence:
  num_frames: 20
  native_frame_skip: 5
  cue_start: 1
  cue_length: 3
  last_cue_frame: 3
  predictor_context: 3
  evidence_ages: [4, 8, 15]
  endpoint_frames: [7, 11, 18]
  predictor_contexts: [[4, 5, 6], [8, 9, 10], [15, 16, 17]]
  endpoint_observation_excluded: true
  action_block: concatenate the five normalized native controls after each sampled observation
  no_label_information_after_frame: 3

adapter:
  visual_shape: [196, 384]
  native_token_dim: 404
  native_token_layout: [visual_384, proprio_10, action_10]
  carrier_scope: one parameter-shared carrier independently applied to all 196 patch trajectories
  carrier_input_dim: 384
  carrier_action_dim: 10
  injection: residual fused visual replaces only native visual channels before the frozen predictor
  cross_patch_mixing: frozen official predictor attention only
  full_sequence_recurrence_before_read: true
  reset_ablation: reinitialize the identical carrier at the first frame of each legal three-frame predictor context
  primary_read: frozen predictor final visual output from full-sequence carrier state
  secondary_read: carrier pre-observation prior at endpoint
  zero_init_native_equivalence_required: true

objective:
  labels_used_for_carrier_training: false
  name: frozen-native shifted next-feature MSE
  source: three consecutive carrier-fused visual frames plus frozen native proprio/action embeddings
  target: all three one-step-shifted frozen visual and proprioceptive features
  supervised_channels: [visual_384, proprio_10]
  excluded_channels: [action_10]
  host_parameters_trainable: false

training:
  arms: [none, gru, lstm, ssm, fixed_trust]
  seeds: [0, 1, 2, 3, 4]
  epochs: 20
  batch_size: 8
  windows_per_batch: 2
  learning_rate: 0.0003
  weight_decay: 0.00001
  scheduler: cosine_to_zero
  gradient_clip_norm: 1.0
  common_schedule_seed_base: 831000
  checkpoint_selection: final_epoch_no_early_stopping
  deterministic_algorithms: true
  mixed_precision: bfloat16_predictor_float32_carrier

admission:
  policy: fail closed before any carrier is trained or semantically evaluated
  cue_encoding:
    metric: validation balanced accuracy at last visible cue frame
    minimum: 0.75
    minimum_per_class_recall: 0.70
  shortcuts:
    no_cue_visual_endpoint_balanced_accuracy_maximum: 0.30
    action_only_balanced_accuracy_maximum: 0.30
    proprio_only_balanced_accuracy_maximum: 0.30
    evaluated_at_every_age: true
  cue_only_counterfactual:
    changed_pixels_outside_declared_mask_maximum: 0
    actions_proprio_states_differ_across_labels_maximum: 0
    post_cue_visual_differing_pixels_maximum: 0
  frozen_host_digest_unchanged: true
  all_gates_required: true

evaluation:
  spatial_pool_levels: [1, 2, 4]
  readout: StandardScaler+LogisticRegression(C=1,solver=lbfgs,max_iter=4000,random_state=0)
  separate_readout_per_age_and_arm: true
  primary_metric: held-out balanced accuracy of full-state frozen-predictor output
  contrasts:
    - each trainable arm minus no persistent carrier
    - full-sequence state minus three-frame context-reset state within arm
  validation_predictions_preserved: true
  next_feature_mse_preserved: true

inference:
  method: matched carrier-seed x native-validation-episode cluster bootstrap preserving four-label counterfactual sets
  paired: true
  draws: 20000
  confidence: 0.95
  seed: 832000
  none_effective_independent_models: 1
  resampling_units: [matched carrier seed, native episode]

external_use:
  enabled_only_if_admission_and_controller_gates_pass: true
  evidence_age: 15
  consumer: one shared arm-blind StandardScaler+multinomial LogisticRegression per carrier seed
  consumer_feature: exact registered 1/2/4 spatial-pyramid primary full-predictor read
  consumer_feature_dim: 8064
  consumer_training_deck: pooled full-state training features from every arm with no arm identifier
  validation_fit_forbidden: true
  native_planner: false
  controller: unmodified released DINO-WM WaypointController
  simulator: current MuJoCo binding executing XML generated by unmodified released PointMaze source
  current_mujoco_required_minimum_version: 3.0
  frame_skip: 5
  physics_timestep: 0.01
  execution_horizon: 160
  success_radius: 0.50
  oracle_success_minimum: 0.90
  oracle_per_class_success_minimum: 0.85
  off_diagonal_false_success_maximum: 0.10
  deterministic_reset_replay_minimum: 1.0
  selected_goal_scored_against_true_goal: true
  random_goal_seed: 833000
  claim_boundary: external memory-conditioned navigation execution, not native DINO-WM planning
  prelock_controller_development:
    source: first 8 locked training selections only; no validation episode
    candidate_horizons: [160, 240, 320]
    selection_rule: smallest horizon with overall oracle >=0.90 and every-goal oracle >=0.875
    receipt: outputs/dinowm_pointmaze_wave3/controller_development/receipt.json
    receipt_identity:
      size: 1634
      sha256: 9cf9507f3d7746b9096c85140030c308b16ffeab698efeace4ebf233c2347993
    goal_cue_or_carrier_metric_computed: false

