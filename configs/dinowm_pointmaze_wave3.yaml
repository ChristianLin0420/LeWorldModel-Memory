# Wave 3: preregistered persistent-carrier audit on the released DINO-WM
# PointMaze checkpoint and native trajectory archive.  Semantic admissions are
# computed only after this file and every implementation input are sealed.
schema_version: 1
study: Frozen official DINO-WM PointMaze transient-goal memory audit
protocol_status: locked_before_formal_metrics
draft_date: 2026-07-07

scope:
  status: preregistered_cross_environment_extension
  host_family: official released DINO-WM
  environment: PointMaze U-maze
  paper_edits: false
  allowed_claims:
    - carrier retention under one frozen official DINO-WM PointMaze checkpoint
    - cue-placement retention at three fixed evidence ages
    - external arm-blind goal-selection and current-MuJoCo waypoint execution if every gate passes
  prohibited_claims:
    - native DINO-WM planning contains persistent memory
    - native DINO-WM planner improvement
    - universal maze-memory generalization
    - exact numerical comparison to LeWM or PushT banks
    - causal explanation of a cross-host ranking reversal

