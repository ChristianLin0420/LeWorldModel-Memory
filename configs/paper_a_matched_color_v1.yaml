# Adaptive Wave-1b color-only matched-host audit. This protocol is declared
# after Wave-1 stopped on location-cue availability and before any Wave-1b
# admission or carrier outcome. The V1 receipt is provenance, not inference.
schema_version: 1
study: paper-a-matched-color-v1
protocol_status: adaptive-locked-before-formal-outcomes
implementation_lock: configs/paper_a_matched_color_v1.lock.json

hosts: [reacher, pusht, tworoom]
targets: [color]
ages: [4, 8, 15]
arms: [none, gru, lstm, ssm, fixed_trust]
seeds: [0, 1, 2, 3, 4]

adaptive_origin:
  parent_study: paper-a-matched-host-v1
  adaptation: drop failed location target; retain predeclared color target unchanged
  trigger: V1 Reacher location cue-availability gate failed while color passed at all ages
  timing: declared after V1 availability stop and before every Wave-1b formal outcome
  v1_carrier_outcomes_used: false
  v1_admission_metrics_used_for_adaptation: true
  v1_admission_metrics_used_for_wave1b_inference: false
  preserve_v1_failure: true
  v1_spec:
    path: configs/paper_a_matched_host_v1.yaml
    size: 7649
    sha256: 5febf1c31d8a9f73c83a4d26ba4ed0f9934a23e6099840e50ceba32b4b740b7f
  v1_spec_sidecar:
    path: configs/paper_a_matched_host_v1.sha256
    size: 95
    sha256: 73a653b76a92ed016d075c4cde7ac57cc43c9d3fae28cbabb14c7a23023eade3
  v1_implementation_lock:
    path: configs/paper_a_matched_host_v1.lock.json
    size: 3461
    sha256: 83c2ae48ea53e2080606fa7e15e30339668deb338fd556527025e9418b076998
  v1_stop_receipt:
    path: outputs/paper_a_matched_host_v1/cache/reacher/manifest.json
    size: 22068
    sha256: e7d445bbdeb7559ee7af6b3476783339f6f4c344165d8948caae89d26a20eedd
  hdf_v1_exclusion_policy: union episode_index from all four identity-verified V1 HDF train and validation base caches pinned with sidecars and host receipts at Wave-1b seal time

execution:
  allowed_devices: ["cuda:0"]
  default_device: "cuda:0"
  explicit_execute_required: true
  deterministic_algorithms: true
  forbid_cuda3: true
  initial_physical_gpu: 0

inputs:
  reacher:
    kind: fresh-dm-control-reacher-easy
    repo_id: quentinll/lewm-reacher
    model_revision: 62adae4b71dc474ddf8f794c476ebfe737a743ca
    identity_records: [weights]
    weights:
      path: outputs/paper_a_expansion/pretrained/lewm-reacher/weights.pt
      size: 72290849
      sha256: eb70b1fd5409f8f81875d62f5ee5a20dd220a3128a477de66b5760f475f0f469
    train_base_seed: 20260841
    validation_base_seed: 20260842
    raw_frame_size: 64
    target_alpha_zero: true
  pusht:
    kind: official-root-hdf5
    repo_id: quentinll/lewm-pusht
    model_revision: 22b330c28c27ead4bfd1888615af1340e3fe9052
    dataset_revision: 655cd446b9929369d7d406001da85c15d1457850
    identity_records: [config, weights, dataset]
    bundle_path: outputs/paper_a_strengthening/pretrained/lewm-pusht
    config:
      path: outputs/paper_a_strengthening/pretrained/lewm-pusht/config.json
      size: 1313
      sha256: 2564086e961e7b5c7c04dffc451091115b389a590645ff19653c64fd0bc16e09
    weights:
      path: outputs/paper_a_strengthening/pretrained/lewm-pusht/weights.pt
      size: 72290721
      sha256: 48938400ae3464c9680731287f583a9cb516f55a8ec64ea13a91be47fb15b607
    dataset:
      path: outputs/paper_a_strengthening/data/pusht_expert_train.h5
      size: 46300921856
      sha256: b6ebd9ac94bbe9e383f6e7a9cd92d74e9aa665ea57b758ed3717b0ee7df8d4fb
    state_key: state
    split_seed: 20260851
    start_seed: 20260852
    v1_base_cache_paths:
      - outputs/paper_a_matched_host_v1/cache/pusht/base/train.npz
      - outputs/paper_a_matched_host_v1/cache/pusht/base/validation.npz
    v1_host_manifest_path: outputs/paper_a_matched_host_v1/cache/pusht/manifest.json
  tworoom:
    kind: official-root-hdf5
    repo_id: quentinll/lewm-tworooms
    model_revision: 77adaae0bc31deab21c93740d1f8bb947cd0bdec
    dataset_revision: 6903a2de048b13819d812da0b4dd661290bc01e4
    identity_records: [config, weights, archive, dataset]
    bundle_path: outputs/paper_a_wave1_inputs/lewm-tworooms
    config:
      path: outputs/paper_a_wave1_inputs/lewm-tworooms/config.json
      size: 1313
      sha256: 2564086e961e7b5c7c04dffc451091115b389a590645ff19653c64fd0bc16e09
    weights:
