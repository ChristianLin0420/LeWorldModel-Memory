      size: 3425937909
      sha256: 494b1a02f0765cd9a0d9daf1786c419ced1009977fc45d01e3158932f8d080ca
    dataset:
      path: /dev/shm/paper_a_matched_host_v1/tworoom.h5
      external_tmpfs: true
      size: 12775849984
      sha256: 129a36aa93ea0de488d2bcc876e396de9e3907bf66c6aae6394e542ef6a6d623
    state_key: observation
    split_seed: 20260861
    start_seed: 20260862
    v1_base_cache_paths:
      - outputs/paper_a_matched_host_v1/cache/tworoom/base/train.npz
      - outputs/paper_a_matched_host_v1/cache/tworoom/base/validation.npz
    v1_host_manifest_path: outputs/paper_a_matched_host_v1/cache/tworoom/manifest.json
    release_paper_history_discrepancy:
      authenticated_config_history: 3
      paper_appendix_history: 1
      executable_truth: authenticated released config and weights

sequence:
  num_frames: 20
  frame_skip: 5
  decision_index: 19
  cue_length: 3
  cue_intervals:
    age-4: [12, 15]
    age-8: [8, 11]
    age-15: [1, 4]
  predictor_history: 3
  endpoint_history: 3
  endpoint_feature: concat(z[16],z[17],z[18],prior_read[19])
  current_observation_excluded: true

selection:
  train_episodes: 1200
  validation_episodes: 480
  one_sequence_per_episode: true
  episode_disjoint_splits: true
  exclude_v1_hdf_episode_indices_before_permutation: true
  train_label_seed: 20260831
  validation_label_seed: 20260832

cue:
  colors: 4
  locations: 4
  target: color
  location_role: exact-balanced randomized nuisance
  rgb_palette:
    - [230, 57, 70]
    - [40, 160, 84]
    - [45, 108, 223]
    - [239, 174, 45]
  normalized_centers:
    - [0.18, 0.18]
    - [0.82, 0.18]
    - [0.18, 0.82]
    - [0.82, 0.82]
  square_side_fraction: 0.20
  all_16_combinations_exactly_balanced: true
  labels_independent_of_base_episode: true
  offcue_bytes_identical: true

action_normalization:
  source: all finite raw two-dimensional training-source actions per host
  ddof: 1
  order: normalize each raw 2-D action then time-major flatten five actions to 10-D

admission:
  chance: 0.25
  cue_balanced_accuracy_min: 0.75
  cue_min_class_recall_min: 0.70
  shortcut_ceiling: 0.30
  shortcut_features:
    final_context_latent: concat(z[16],z[17],z[18])
    final_action: concat(a[15],a[16],a[17],a[18])
    final_state: state[19]
  all_hosts_ages_must_pass: true
  no_carrier_training_if_any_gate_fails: true
  frozen_host_hash_required: true

carrier_training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.00001
  scheduler: cosine-annealing
  gradient_clip_norm: 1.0
  windows_per_episode: 8
  training_rng_offset: 581000
  age_balanced_mixture: true
  frozen_encoder: true
  frozen_predictor: true

readout:
  model: StandardScaler+LogisticRegression
  logistic_c: 1.0
  solver: lbfgs
  max_iter: 4000
  random_state: 0
  metric: balanced_accuracy
  separate_readout_per_age: true

statistics:
  bootstrap_draws: 20000
  bootstrap_seed: 20260821
  confidence: 0.95
  interval: percentile
  seed_resampling: jointly resample carrier seed indices across hosts
  episode_resampling: independently by host and stratified by 16-way joint label
  preserve_pairing: ages and arms within host
  equivalence_margin: 0.05
  primary_interaction: age-15 PushT-minus-Reacher difference in fixed-trust-minus-SSM color balanced accuracy
  nuisance_location_summary: per-location accuracy and worst-location accuracy for every host-arm-age cell
  no_pooled_host_memory_score: true

tworoom_use:
  enabled_only_if_all_color_admissions_pass: true
  target: color
  nuisance: location
  heldout_episodes: 480
  split_seed: 20260871
  start_seed: 20260872
  label_seed: 20260873
  random_goal_seed: 20260874
  exclude_locked_v1_and_wave1b_train_validation_episodes: true
  cue_age: 15
  cue_length: 3
  model_frames: 20
  decision_index: 19
  state_position_indices: [0, 1]
  goal_waypoints:
    - [154.0, 40.0]
    - [196.0, 40.0]
    - [154.0, 174.0]
    - [196.0, 174.0]
  color_to_goal_index: [0, 1, 2, 3]
  consumer: one shared arm-blind StandardScaler+multinomial LogisticRegression per seed, equally pooled over all five arms
  controller: pinned deterministic TwoRoom ExpertPolicy
  physics_seed: 0
  fixed_physics_across_arms_episodes_and_counterfactual_goals: true
  max_execution_steps: 64
  success_radius: 16.0
  oracle_success_min: 0.90
  oracle_per_class_success_min: 0.90
  off_diagonal_false_success_max: 0.05
  replay_fidelity_min: 0.99
  bootstrap_draws: 20000
  bootstrap_seed: 20260875
  claim_boundary: external color-memory-conditioned TwoRoom waypoint execution, not native LeWM planning
  upstream_environment:
    path: outputs/pusht_downstream_use_v1/vendor/stable-worldmodel/stable_worldmodel/envs/two_room/env.py
    sha256: 5e1d392de5b02472062dbe872aded67fd465fcc8f7eaa1c02a753b2fc31c61f0
    revision: 0ef3856875e70a1283e637fcd2ab936eae6c4e6f
  upstream_controller:
    path: outputs/pusht_downstream_use_v1/vendor/stable-worldmodel/stable_worldmodel/envs/two_room/expert_policy.py
    sha256: 5939318d2a671ce00abf46be74ae22cf2452ea48426eb9dc651d04514849e4f4

cache:
  frame_batch_size: 128
  compression_level: 1
  store_base_and_cue_separately: true

outputs:
  root: outputs/paper_a_matched_color_v1
  cache: outputs/paper_a_matched_color_v1/cache
  carriers: outputs/paper_a_matched_color_v1/carriers
  logs: outputs/paper_a_matched_color_v1/logs
  use: outputs/paper_a_matched_color_v1/use
