<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#252A2E"/>
    </marker>
    <marker id="fs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#626E76"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="600" fill="#FFFFFF"/>
  <text x="490" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#252A2E">V19 study flow: certify &#8594; preflight &#8594; develop &#8594; frozen confirmation</text>

  <!-- Phase boxes -->
  <!-- P1a -->
  <rect x="36" y="64" width="172" height="150" rx="10" fill="#EDF7F5" stroke="#28756D" stroke-width="1.6"/>
  <rect x="36" y="64" width="172" height="26" rx="10" fill="#28756D"/>
  <text x="122" y="82" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">P1a &#183; build tasks</text>
  <text x="122" y="110" text-anchor="middle" font-size="11" fill="#252A2E">T1&#8211;T4 + dev-only instances</text>
  <text x="122" y="130" text-anchor="middle" font-size="11" fill="#252A2E">construction certificate:</text>
  <text x="122" y="147" text-anchor="middle" font-size="10.5" font-style="italic" fill="#626E76">&#958; &#8776; chance from ground-truth</text>
  <text x="122" y="162" text-anchor="middle" font-size="10.5" font-style="italic" fill="#626E76">(s&#8320;, actions, t) &#8212; no training</text>
  <text x="122" y="188" text-anchor="middle" font-size="10.5" fill="#626E76">leakage rules: onset, rendering,</text>
  <text x="122" y="202" text-anchor="middle" font-size="10.5" fill="#626E76">timing, visual-only exogenous</text>

  <line x1="208" y1="139" x2="230" y2="139" stroke="#252A2E" stroke-width="1.6" marker-end="url(#fa)"/>

  <!-- P0 -->
  <rect x="232" y="64" width="172" height="150" rx="10" fill="#F5F6F7" stroke="#252A2E" stroke-width="1.6"/>
  <rect x="232" y="64" width="172" height="26" rx="10" fill="#252A2E"/>
  <text x="318" y="82" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">P0 &#183; host preflight</text>
  <text x="318" y="110" text-anchor="middle" font-size="11" fill="#252A2E">exact SIGReg vs VICReg ref</text>
  <text x="318" y="127" text-anchor="middle" font-size="11" fill="#252A2E">corruption-on arms &#183; 3 seeds</text>
  <text x="318" y="147" text-anchor="middle" font-size="10.5" fill="#626E76">rank &#8805; 16 &#183; variance &#183; convergence</text>
  <text x="318" y="162" text-anchor="middle" font-size="10.5" fill="#626E76">EP-plateau + gradient-ratio telemetry</text>
  <text x="318" y="186" text-anchor="middle" font-size="10.5" fill="#626E76">attribution: host fault vs task fault</text>
  <text x="318" y="200" text-anchor="middle" font-size="10.5" fill="#626E76">fallback: VICReg host preregistered</text>

  <line x1="404" y1="139" x2="426" y2="139" stroke="#252A2E" stroke-width="1.6" marker-end="url(#fa)"/>

  <!-- P1b -->
  <rect x="428" y="64" width="172" height="150" rx="10" fill="#EDF7F5" stroke="#28756D" stroke-width="1.6"/>
  <rect x="428" y="64" width="172" height="26" rx="10" fill="#28756D"/>
  <text x="514" y="82" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">P1b &#183; checkpoint certs</text>
  <text x="514" y="110" text-anchor="middle" font-size="11" fill="#252A2E">with each frozen P0 encoder:</text>
  <text x="514" y="130" text-anchor="middle" font-size="10.5" fill="#626E76">integrator R&#178;(&#958;) &#8776; chance</text>
  <text x="514" y="145" text-anchor="middle" font-size="10.5" fill="#626E76">AND sighted probe R&#178;(&#958;) high</text>
  <text x="514" y="165" text-anchor="middle" font-size="10.5" fill="#252A2E">memory demand :=</text>
  <text x="514" y="180" text-anchor="middle" font-size="10.5" fill="#252A2E">sighted R&#178; &#8722; integrator R&#178;</text>
  <text x="514" y="200" text-anchor="middle" font-size="10.5" fill="#626E76">then ONE freeze event</text>

  <line x1="600" y1="139" x2="622" y2="139" stroke="#252A2E" stroke-width="1.6" marker-end="url(#fa)"/>

  <!-- P2 -->
  <rect x="624" y="64" width="164" height="150" rx="10" fill="#FBF2E8" stroke="#A45A1C" stroke-width="1.6"/>
  <rect x="624" y="64" width="164" height="26" rx="10" fill="#A45A1C"/>
  <text x="706" y="82" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">P2 &#183; development</text>
  <text x="706" y="110" text-anchor="middle" font-size="11" fill="#252A2E">dev-only task instances</text>
  <text x="706" y="128" text-anchor="middle" font-size="11" fill="#252A2E">(P3 set never opened)</text>
  <text x="706" y="150" text-anchor="middle" font-size="10.5" fill="#626E76">LKC variants vs baselines</text>
  <text x="706" y="165" text-anchor="middle" font-size="10.5" fill="#626E76">telemetry validation</text>
  <text x="706" y="180" text-anchor="middle" font-size="10.5" fill="#626E76">power analysis (&#8805;80%)</text>
  <text x="706" y="195" text-anchor="middle" font-size="10.5" fill="#626E76">gate calibration</text>

  <line x1="788" y1="139" x2="810" y2="139" stroke="#252A2E" stroke-width="1.6" marker-end="url(#fa)"/>

  <!-- P3 -->
  <rect x="812" y="64" width="150" height="150" rx="10" fill="#F1F7E8" stroke="#4B780A" stroke-width="1.8"/>
  <rect x="812" y="64" width="150" height="26" rx="10" fill="#4B780A"/>
  <text x="887" y="82" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">P3 &#183; confirmation</text>
  <text x="887" y="110" text-anchor="middle" font-size="11" fill="#252A2E">frozen: T1&#8211;T4 (+T5</text>
  <text x="887" y="126" text-anchor="middle" font-size="11" fill="#252A2E">descriptive anchor)</text>
  <text x="887" y="148" text-anchor="middle" font-size="10.5" fill="#626E76">write-once manifests</text>
  <text x="887" y="163" text-anchor="middle" font-size="10.5" fill="#626E76">crossed bootstrap</text>
  <text x="887" y="178" text-anchor="middle" font-size="10.5" fill="#626E76">independent audit</text>
  <text x="887" y="196" text-anchor="middle" font-size="10.5" fill="#626E76">(V18 machinery verbatim)</text>

  <!-- iterate loop -->
  <path d="M 514 216 C 514 248, 122 248, 122 216" fill="none" stroke="#626E76" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#fs)"/>
  <text x="318" y="252" text-anchor="middle" font-size="11" font-style="italic" fill="#626E76">iterate P1a &#8596; P0 &#8596; P1b until certificates pass &#8212; then a single freeze</text>

  <!-- Tier stack -->
  <text x="490" y="300" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#252A2E">Evaluation inside P3: three tiers replace V18&#8217;s flat 11-gate conjunction</text>

  <rect x="120" y="318" width="740" height="64" rx="10" fill="#F5F6F7" stroke="#626E76" stroke-width="1.4"/>
  <text x="150" y="344" font-size="12.5" font-weight="bold" fill="#252A2E">TIER 0 &#8212; validity preconditions (fail-closed screening)</text>
  <text x="150" y="366" font-size="11.5" fill="#626E76">host health &#183; task certificates &#183; telemetry sanity &#8212; failing stops the launch; it does not label the hypothesis</text>

  <line x1="490" y1="382" x2="490" y2="404" stroke="#252A2E" stroke-width="1.6" marker-end="url(#fa)"/>

  <rect x="120" y="406" width="740" height="64" rx="10" fill="#F1F7E8" stroke="#4B780A" stroke-width="1.6"/>
  <text x="150" y="432" font-size="12.5" font-weight="bold" fill="#4B780A">TIER 1 &#8212; one primary endpoint</text>
  <text x="150" y="454" font-size="11.5" fill="#252A2E">LKC vs action-conditioned recurrent envelope on &#958; (deep gap + first post), pooled crossed-bootstrap CI &#62; 0, &#8805; 80% power</text>

  <line x1="490" y1="470" x2="490" y2="492" stroke="#252A2E" stroke-width="1.6" marker-end="url(#fa)"/>
  <text x="512" y="486" font-size="10.5" font-style="italic" fill="#626E76">only if Tier 1 passes (Holm-corrected)</text>

  <rect x="120" y="494" width="740" height="80" rx="10" fill="#EDF7F5" stroke="#28756D" stroke-width="1.6"/>
  <text x="150" y="520" font-size="12.5" font-weight="bold" fill="#28756D">TIER 2 &#8212; mechanism gates, each with a registered coordinate</text>
  <text x="150" y="542" font-size="11.5" fill="#252A2E">no-correction bar (k&#8801;0) &#183; action transport (B=0 + action-swap, endogenous coord.) &#183; gain adaptivity + calibration</text>
  <text x="150" y="560" font-size="11.5" fill="#252A2E">history-swap (Myhill&#8211;Nerode) &#183; unobserved evolution (T4) &#183; behavior-level planning (probe-mediated, ablation-checked)</text>
</svg>
