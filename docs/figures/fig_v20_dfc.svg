<svg xmlns="http://www.w3.org/2000/svg" width="980" height="700" viewBox="0 0 980 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="da" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#252A2E"/>
    </marker>
    <marker id="dg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#4B780A"/>
    </marker>
    <marker id="db" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#A45A1C"/>
    </marker>
    <marker id="dt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#28756D"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="700" fill="#FFFFFF"/>
  <text x="490" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#252A2E">DFC &#8212; Dual-Filter Carrier: the V19 LKC plus a Kalman filter over its own calibration</text>

  <!-- ===== input path ===== -->
  <rect x="30" y="70" width="150" height="54" rx="9" fill="#EDF7F5" stroke="#28756D" stroke-width="1.8"/>
  <text x="105" y="92" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#252A2E">o&#8348; (pixels)</text>
  <text x="105" y="110" text-anchor="middle" font-size="10.5" fill="#626E76">64&#215;64, certified tasks</text>

  <rect x="220" y="70" width="190" height="54" rx="9" fill="#EDF7F5" stroke="#28756D" stroke-width="1.8"/>
  <text x="315" y="88" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#252A2E">Encoder E (frozen)</text>
  <text x="315" y="104" text-anchor="middle" font-size="10.5" fill="#28756D">host: VisReg (scale + shape + center)</text>
  <text x="315" y="118" text-anchor="middle" font-size="10.5" fill="#626E76">z&#8348; = E(o&#8348;) &#8712; &#8477;&#8309;&#185;&#178;, then x&#8348; = W&#8348;&#7523; z&#8348;</text>

  <line x1="180" y1="97" x2="216" y2="97" stroke="#28756D" stroke-width="1.8" marker-end="url(#dt)"/>
  <line x1="410" y1="97" x2="452" y2="97" stroke="#252A2E" stroke-width="1.8" marker-end="url(#da)"/>
  <text x="431" y="88" text-anchor="middle" font-size="11" fill="#252A2E">x&#8348;</text>

  <rect x="640" y="70" width="150" height="54" rx="9" fill="#F5F6F7" stroke="#626E76" stroke-width="1.6"/>
  <text x="715" y="92" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#252A2E">a&#8348;&#8331;&#8321; (action)</text>
  <text x="715" y="110" text-anchor="middle" font-size="10.5" fill="#626E76">always observed</text>

  <!-- ===== fast filter box ===== -->
  <rect x="80" y="170" width="560" height="230" rx="12" fill="#F1F7E8" stroke="#4B780A" stroke-width="2.2"/>
  <rect x="80" y="170" width="560" height="32" rx="12" fill="#4B780A"/>
  <text x="360" y="191" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">FAST FILTER (per step &#8212; unchanged V19 LKC, N=32, &#964; &#8712; [2, 96] + hold)</text>

  <text x="110" y="228" font-size="12" font-weight="bold" fill="#4B780A">predict</text>
  <text x="200" y="228" font-size="12" fill="#252A2E">m&#8315;&#8348; = A m&#8348;&#8331;&#8321; + B a&#8348;&#8331;&#8321;</text>
  <text x="430" y="228" font-size="12" fill="#252A2E">&#963;&#8315;&#8348; = A&#178; &#963;&#8348;&#8331;&#8321; + q</text>

  <text x="110" y="258" font-size="12" font-weight="bold" fill="#4B780A">gain</text>
  <text x="200" y="258" font-size="12" fill="#252A2E">k&#8348; = &#963;&#8315;&#8348; / (&#963;&#8315;&#8348; + r)</text>
  <text x="430" y="258" font-size="11" font-style="italic" fill="#626E76">observe only; imagine: k&#8348; = 0</text>

  <text x="110" y="288" font-size="12" font-weight="bold" fill="#4B780A">correct</text>
  <text x="200" y="288" font-size="12" fill="#252A2E">m&#8348; = m&#8315;&#8348; + k&#8348; &#8857; (x&#8348; &#8722; m&#8315;&#8348;)</text>
  <text x="430" y="288" font-size="12" fill="#252A2E">&#963;&#8348; = (1 &#8722; k&#8348;) &#963;&#8315;&#8348;</text>

  <text x="110" y="318" font-size="12" font-weight="bold" fill="#4B780A">read</text>
  <text x="200" y="318" font-size="12" fill="#252A2E">z&#771;&#8348; = z&#8348; + W&#8338; m&#8348;&#160;&#160;(W&#8338; zero-init)</text>
  <text x="430" y="318" font-size="12" fill="#252A2E">prior_read&#8348; = W&#8338; m&#8315;&#8348;</text>

  <rect x="100" y="342" width="520" height="42" rx="8" fill="#FFFFFF" stroke="#4B780A" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="360" y="359" text-anchor="middle" font-size="11" fill="#252A2E">the innovation &#949;&#8348; = x&#8348; &#8722; m&#8315;&#8348; and its predicted scale S&#8348; = &#963;&#8315;&#8348; + r are computed here anyway &#8212;</text>
  <text x="360" y="375" text-anchor="middle" font-size="11" fill="#252A2E">the slow filter consumes them for free: &#8467;&#8348;(&#966;) = &#189; &#931;&#8342; [ &#949;&#8348;&#8342;&#178;/S&#8348;&#8342; + log S&#8348;&#8342; ]</text>

  <line x1="490" y1="124" x2="490" y2="166" stroke="#252A2E" stroke-width="1.8" marker-end="url(#da)"/>
  <line x1="715" y1="124" x2="715" y2="148 " stroke="#626E76" stroke-width="1.6"/>
  <line x1="715" y1="148" x2="644" y2="222" stroke="#626E76" stroke-width="1.6" marker-end="url(#da)"/>

  <!-- ===== slow filter box ===== -->
  <rect x="680" y="170" width="270" height="230" rx="12" fill="#FBF2E8" stroke="#A45A1C" stroke-width="2.2"/>
  <rect x="680" y="170" width="270" height="32" rx="12" fill="#A45A1C"/>
  <text x="815" y="191" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">SLOW FILTER (deployment only)</text>

  <text x="815" y="222" text-anchor="middle" font-size="11.5" fill="#252A2E">state = &#966; = (log r, log q, B) &#8212; tiny</text>
  <text x="815" y="244" text-anchor="middle" font-size="11.5" fill="#252A2E">model: &#966; random walk, rate &#961; &#8810; q</text>

  <text x="815" y="272" text-anchor="middle" font-size="12" fill="#252A2E">P&#8315;&#8348; = P&#8348;&#8331;&#8321; + &#961;</text>
  <text x="815" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#A45A1C">&#951;&#8348; = P&#8315;&#8348; / (P&#8315;&#8348; + s&#8348;)</text>
  <text x="815" y="316" text-anchor="middle" font-size="12" fill="#252A2E">&#966;&#8348; = &#966;&#8348;&#8331;&#8321; &#8722; &#951;&#8348; &#8857; &#8711;&#966; &#8467;&#8348;</text>
  <text x="815" y="338" text-anchor="middle" font-size="12" fill="#252A2E">P&#8348; = (1 &#8722; &#951;&#8348;) P&#8315;&#8348;</text>

  <text x="815" y="364" text-anchor="middle" font-size="10.5" fill="#626E76">s&#8348; = EMA[(&#8711;&#966; &#8467;)&#178;]&#160;&#8212; curvature proxy</text>
  <text x="815" y="380" text-anchor="middle" font-size="10.5" font-style="italic" fill="#A45A1C">&#952; (encoder, W&#8338;, A-spectrum) never moves</text>

  <!-- innovation handoff arrows -->
  <line x1="640" y1="363" x2="676" y2="363" stroke="#A45A1C" stroke-width="1.8" marker-end="url(#db)"/>
  <text x="658" y="352" text-anchor="middle" font-size="10.5" fill="#A45A1C">&#949;&#8348;, S&#8348;</text>
  <path d="M 815 400 C 815 430, 500 430, 380 402" fill="none" stroke="#A45A1C" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#db)"/>
  <text x="620" y="443" text-anchor="middle" font-size="11" fill="#A45A1C">updated trust (r, q, B) feeds the next fast-filter step &#8212; slow corrects fast</text>

  <!-- ===== timescale separation banner ===== -->
  <rect x="80" y="470" width="870" height="66" rx="10" fill="#F5F6F7" stroke="#626E76" stroke-width="1.4"/>
  <text x="515" y="494" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#252A2E">Timescale separation is the whole design (Insight 9: &#8220;trust must be slow&#8221;)</text>
  <text x="515" y="513" text-anchor="middle" font-size="11.5" fill="#626E76">A cue at frame 12 is explained by state uncertainty &#963;&#8315; (k&#8348; spikes, m absorbs it; &#966; barely moves &#8212; one gradient sample).</text>
  <text x="515" y="529" text-anchor="middle" font-size="11.5" fill="#626E76">A miscalibrated r is explained by parameter uncertainty P (&#8467;&#8348; gradients accumulate with a consistent sign; &#951;&#8348; lets &#966; drift to the new regime).</text>

  <!-- ===== limits / honest ledger ===== -->
  <rect x="80" y="556" width="425" height="120" rx="10" fill="#FFFFFF" stroke="#4B780A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="292" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#4B780A">Registered limits (subsumption gates)</text>
  <text x="100" y="602" font-size="11" fill="#252A2E">&#961; = 0&#160;&#160;&#8658;&#160;&#951;&#8348;&#8594;0: exactly V19 fixed-trust (the P3 winner)</text>
  <text x="100" y="620" font-size="11" fill="#252A2E">&#951;&#8348; &#8801; const&#160;&#8658;&#160;AdaJEPA-style fixed step (the control arm)</text>
  <text x="100" y="638" font-size="11" fill="#252A2E">k&#8348; &#8801; 0&#160;&#8658;&#160;the legal integrator (V18 baseline)</text>
  <text x="100" y="660" font-size="10.5" font-style="italic" fill="#626E76">DFC must beat each of its own limits or the addition is falsified.</text>

  <rect x="525" y="556" width="425" height="120" rx="10" fill="#FFFFFF" stroke="#A45A1C" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="737" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#A45A1C">Honest ledger (everything we still choose)</text>
  <text x="545" y="602" font-size="11" fill="#252A2E">&#961; (walk rate) &#8212; THE new knob; swept once, logged, frozen</text>
  <text x="545" y="620" font-size="11" fill="#252A2E">s&#8348; estimator (grad&#178; EMA) &#183; contents of &#966; (r,q,B vs +spectrum)</text>
  <text x="545" y="638" font-size="11" fill="#252A2E">inherited: N, &#964;-spectrum, W&#8338; zero-init (validated in V19)</text>
  <text x="545" y="660" font-size="10.5" font-style="italic" fill="#626E76">No per-frame trust head, no training-time NLL (Insights 8&#8211;9).</text>
</svg>
