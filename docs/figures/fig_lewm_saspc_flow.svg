<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1900" viewBox="0 0 1400 1900" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">V18 stabilized LeWorldModel with persistent V8 memory</title>
  <desc id="svg-desc">Two vertically stacked academic panels. Panel a shows corrupted RGB observations encoded frame by frame, updated by a persistent action-conditioned two-state V8 predict-correct memory, fused into a true sliding history of three latents, and passed to a causal LeWorldModel predictor. The shared encoder maps a clean next RGB frame to an active target trained with prediction plus unit-weight VICReg variance and covariance losses. Panel b shows evaluation-only native-state probing and the no-action, single-read, static, and dynamic V8 interventions. Native state and reward never enter training.</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2F6FB0"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#D97706"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#287A5B"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6C4AA4"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#B6463A"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#68727F"/>
    </marker>
    <pattern id="cutout" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#E5E9EE"/>
      <rect width="6" height="16" fill="#AAB3BE"/>
    </pattern>
    <style>
      text { font-family: "DejaVu Sans", "Liberation Sans", Arial, sans-serif; fill: #17212B; }
      .panel-title { font-size: 43px; font-weight: 700; }
      .section { font-size: 37px; font-weight: 700; }
      .label { font-size: 34px; font-weight: 700; }
      .body { font-size: 30px; }
      .note { font-size: 30px; fill: #4F5B67; }
      .math { font-family: "DejaVu Sans Mono", "Liberation Mono", monospace; font-size: 30px; }
      .panel { fill: #FFFFFF; stroke: #B9C3CE; stroke-width: 3; }
      .obs { fill: #EAF2FA; stroke: #2F6FB0; stroke-width: 3; }
      .action { fill: #FFF0DF; stroke: #D97706; stroke-width: 3; }
      .memory { fill: #ECF6F1; stroke: #287A5B; stroke-width: 3; }
      .fast { fill: #E5F3EB; stroke: #287A5B; stroke-width: 3; }
      .medium { fill: #F0EBF8; stroke: #6C4AA4; stroke-width: 3; }
      .predictor { fill: #F0EBF8; stroke: #6C4AA4; stroke-width: 3; }
      .target { fill: #E7F5F4; stroke: #177F79; stroke-width: 3; }
      .loss { fill: #FFF0EE; stroke: #B6463A; stroke-width: 3; }
      .eval { fill: #F2F4F6; stroke: #68727F; stroke-width: 3; }
      .warn { fill: #FFF7DA; stroke: #B58A15; stroke-width: 3; }
      .blue-arrow { fill: none; stroke: #2F6FB0; stroke-width: 4; marker-end: url(#arrow-blue); }
      .orange-arrow { fill: none; stroke: #D97706; stroke-width: 4; marker-end: url(#arrow-orange); }
      .green-arrow { fill: none; stroke: #287A5B; stroke-width: 4; marker-end: url(#arrow-green); }
      .purple-arrow { fill: none; stroke: #6C4AA4; stroke-width: 4; marker-end: url(#arrow-purple); }
      .red-arrow { fill: none; stroke: #B6463A; stroke-width: 4; marker-end: url(#arrow-red); }
      .gray-arrow { fill: none; stroke: #68727F; stroke-width: 4; stroke-dasharray: 11 9; marker-end: url(#arrow-gray); }
      .shared { fill: none; stroke: #2F6FB0; stroke-width: 3; stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="1900" fill="#FAFBFC"/>

  <!-- Panel A -->
  <rect x="35" y="35" width="1330" height="1285" rx="18" class="panel"/>
  <text x="75" y="96" class="panel-title">(a) V18 model, target, and loss flow</text>

  <!-- Observed RGB stream -->
  <rect x="75" y="135" width="340" height="165" rx="14" class="obs"/>
  <text x="245" y="168" text-anchor="middle" class="label">corrupted</text>
  <text x="245" y="198" text-anchor="middle" class="label">RGB stream</text>
  <g>
    <rect x="103" y="211" width="78" height="55" rx="8" fill="#D8E8F5" stroke="#2F6FB0" stroke-width="2.5"/>
    <circle cx="142" cy="232" r="11" fill="#73A5D1"/>
    <path d="M116,255 L135,241 L151,250 L168,235" fill="none" stroke="#2F6FB0" stroke-width="3"/>
    <rect x="206" y="211" width="78" height="55" rx="8" fill="url(#cutout)" stroke="#68727F" stroke-width="2.5"/>
    <path d="M220,220 L270,257 M270,220 L220,257" stroke="#68727F" stroke-width="4"/>
    <rect x="309" y="211" width="78" height="55" rx="8" fill="#D8E8F5" stroke="#2F6FB0" stroke-width="2.5"/>
    <circle cx="348" cy="232" r="11" fill="#73A5D1"/>
    <path d="M322,255 L341,241 L357,250 L374,235" fill="none" stroke="#2F6FB0" stroke-width="3"/>
  </g>
  <text x="245" y="291" text-anchor="middle" class="math">o_obs[t-2 : t]</text>

  <rect x="515" y="157" width="295" height="120" rx="14" class="obs"/>
  <text x="662" y="196" text-anchor="middle" class="label">shared encoder</text>
  <text x="662" y="236" text-anchor="middle" class="body">per-frame E_theta</text>

  <rect x="925" y="157" width="350" height="120" rx="14" class="obs"/>
  <text x="1100" y="196" text-anchor="middle" class="label">observed</text>
  <text x="1100" y="232" text-anchor="middle" class="label">latent stream</text>
  <text x="1100" y="265" text-anchor="middle" class="math">z_obs[0 : t]</text>

  <path d="M415,217 L514,217" class="blue-arrow"/>
  <path d="M810,217 L924,217" class="blue-arrow"/>

  <!-- Persistent V8 state -->
  <rect x="75" y="340" width="1250" height="470" rx="16" class="memory"/>
  <text x="105" y="391" class="section">persistent V8 predict-correct state</text>
  <text x="105" y="430" class="note">Two states persist beyond H=3.</text>
  <text x="105" y="465" class="note">Zero reset occurs only at an episode boundary.</text>

  <rect x="440" y="471" width="240" height="82" rx="12" class="action"/>
  <text x="560" y="508" text-anchor="middle" class="label">action a[t]</text>
  <text x="560" y="541" text-anchor="middle" class="body">shared W_a</text>

  <rect x="760" y="471" width="310" height="82" rx="12" class="obs"/>
  <text x="915" y="508" text-anchor="middle" class="label">observe</text>
  <text x="915" y="541" text-anchor="middle" class="math">z_obs[t+1]</text>

  <!-- Fast state row -->
  <rect x="105" y="565" width="225" height="105" rx="12" class="fast"/>
  <text x="217" y="607" text-anchor="middle" class="label">fast state</text>
  <text x="217" y="648" text-anchor="middle" class="math">m_f[t]  tau2</text>

  <rect x="405" y="565" width="225" height="105" rx="12" class="fast"/>
  <text x="517" y="607" text-anchor="middle" class="label">predict</text>
  <text x="517" y="648" text-anchor="middle" class="math">p_f[t+1]</text>

  <rect x="705" y="565" width="270" height="105" rx="12" class="fast"/>
  <text x="840" y="600" text-anchor="middle" class="label">innovation</text>
  <text x="840" y="635" text-anchor="middle" class="label">correct</text>
  <text x="840" y="665" text-anchor="middle" class="math">rho_f learned</text>

  <rect x="1050" y="565" width="235" height="105" rx="12" class="fast"/>
  <text x="1167" y="600" text-anchor="middle" class="label">fast</text>
  <text x="1167" y="635" text-anchor="middle" class="label">next state</text>
  <text x="1167" y="665" text-anchor="middle" class="math">m_f[t+1]</text>

  <path d="M330,617 L404,617" class="green-arrow"/>
  <path d="M630,617 L704,617" class="green-arrow"/>
  <path d="M975,617 L1049,617" class="green-arrow"/>

  <!-- Medium state row -->
  <rect x="105" y="690" width="225" height="105" rx="12" class="medium"/>
  <text x="217" y="732" text-anchor="middle" class="label">medium</text>
  <text x="217" y="773" text-anchor="middle" class="math">m_m[t]  tau8</text>

  <rect x="405" y="690" width="225" height="105" rx="12" class="medium"/>
  <text x="517" y="732" text-anchor="middle" class="label">predict</text>
  <text x="517" y="773" text-anchor="middle" class="math">p_m[t+1]</text>

  <rect x="705" y="690" width="270" height="105" rx="12" class="medium"/>
  <text x="840" y="725" text-anchor="middle" class="label">innovation</text>
  <text x="840" y="760" text-anchor="middle" class="label">correct</text>
  <text x="840" y="790" text-anchor="middle" class="math">rho_m learned</text>

  <rect x="1050" y="690" width="235" height="105" rx="12" class="medium"/>
  <text x="1167" y="725" text-anchor="middle" class="label">medium</text>
  <text x="1167" y="760" text-anchor="middle" class="label">next state</text>
  <text x="1167" y="790" text-anchor="middle" class="math">m_m[t+1]</text>

  <path d="M330,742 L404,742" class="purple-arrow"/>
  <path d="M630,742 L704,742" class="purple-arrow"/>
  <path d="M975,742 L1049,742" class="purple-arrow"/>

  <!-- Inputs fan into both update rows -->
  <path d="M560,553 L560,558 L517,558 L517,564" class="orange-arrow"/>
  <path d="M560,558 L665,558 L665,682 L517,682 L517,689" class="orange-arrow"/>
  <path d="M915,553 L915,558 L840,558 L840,564" class="blue-arrow"/>
  <path d="M915,558 L1000,558 L1000,682 L840,682 L840,689" class="blue-arrow"/>
  <path d="M1100,277 L1100,317 L915,317 L915,470" class="blue-arrow"/>

  <!-- Fusion -->
  <rect x="165" y="830" width="520" height="125" rx="14" class="memory"/>
  <text x="425" y="867" text-anchor="middle" class="label">joint RMS read</text>
  <text x="425" y="903" text-anchor="middle" class="label">+ residual fusion</text>
  <text x="425" y="938" text-anchor="middle" class="math">z_tilde = z_obs + W_o r</text>

  <rect x="840" y="830" width="375" height="125" rx="14" class="target"/>
  <text x="1027" y="877" text-anchor="middle" class="label">fused latents</text>
  <text x="1027" y="925" text-anchor="middle" class="math">z_tilde[0 : t]</text>

  <path d="M700,785 L700,808 L425,808 L425,829" class="green-arrow"/>
  <path d="M1100,277 L1305,277 L1305,809 L560,809 L560,829" class="blue-arrow"/>
  <path d="M685,892 L839,892" class="green-arrow"/>

  <!-- Sliding predictor -->
  <rect x="75" y="1005" width="470" height="135" rx="14" class="target"/>
  <text x="310" y="1050" text-anchor="middle" class="label">sliding context H=3</text>
  <text x="310" y="1092" text-anchor="middle" class="math">z_tilde[t-2 : t]</text>
  <text x="310" y="1127" text-anchor="middle" class="body">actions a[t-2 : t]</text>

  <rect x="615" y="1018" width="410" height="110" rx="14" class="predictor"/>
  <text x="820" y="1055" text-anchor="middle" class="label">causal LeWM</text>
  <text x="820" y="1091" text-anchor="middle" class="label">predictor P_phi</text>

  <rect x="1095" y="1018" width="230" height="110" rx="14" class="predictor"/>
  <text x="1210" y="1061" text-anchor="middle" class="label">prediction</text>
  <text x="1210" y="1104" text-anchor="middle" class="math">z_hat[t+1]</text>

  <path d="M1027,955 L1027,980 L310,980 L310,1004" class="green-arrow"/>
  <path d="M545,1073 L614,1073" class="purple-arrow"/>
  <path d="M1025,1073 L1094,1073" class="purple-arrow"/>

  <!-- Active clean target and objective -->
  <rect x="75" y="1180" width="220" height="105" rx="14" class="target"/>
  <text x="185" y="1222" text-anchor="middle" class="label">clean RGB</text>
  <text x="185" y="1264" text-anchor="middle" class="body">frame t+1</text>

  <rect x="340" y="1180" width="230" height="105" rx="14" class="obs"/>
  <text x="455" y="1225" text-anchor="middle" class="label">E_theta</text>
  <text x="455" y="1265" text-anchor="middle" class="body">shared weights</text>

  <rect x="615" y="1180" width="250" height="105" rx="14" class="target"/>
  <text x="740" y="1215" text-anchor="middle" class="label">active</text>
  <text x="740" y="1250" text-anchor="middle" class="label">target</text>
  <text x="740" y="1280" text-anchor="middle" class="math">z_clean[t+1]</text>

  <rect x="885" y="1140" width="440" height="170" rx="14" class="loss"/>
  <text x="1105" y="1174" text-anchor="middle" class="label">prediction</text>
  <text x="1105" y="1208" text-anchor="middle" class="label">+ unit VICReg</text>
  <text x="1105" y="1242" text-anchor="middle" class="math">L = L_pred + L_var</text>
  <text x="1105" y="1274" text-anchor="middle" class="math">+ L_cov</text>
  <text x="1105" y="1305" text-anchor="middle" class="body">no memory-specific auxiliary</text>

  <path d="M295,1232 L339,1232" class="blue-arrow"/>
  <path d="M570,1232 L614,1232" class="blue-arrow"/>
  <path d="M865,1232 L884,1232" class="red-arrow"/>
  <path d="M1210,1128 L1210,1139" class="red-arrow"/>

  <!-- Panel B -->
  <rect x="35" y="1350" width="1330" height="515" rx="18" class="panel"/>
  <text x="75" y="1412" class="panel-title">(b) Evaluation-only probe and exact V8 interventions</text>

  <!-- Evaluation-only probe -->
  <rect x="75" y="1470" width="205" height="100" rx="13" class="memory"/>
  <text x="177" y="1506" text-anchor="middle" class="label">frozen V8</text>
  <text x="177" y="1547" text-anchor="middle" class="body">prior / state</text>

  <rect x="335" y="1470" width="245" height="100" rx="13" class="eval"/>
  <text x="457" y="1506" text-anchor="middle" class="label">linear probe</text>
  <text x="457" y="1547" text-anchor="middle" class="body">evaluation fit only</text>

  <rect x="335" y="1620" width="245" height="90" rx="13" class="eval"/>
  <text x="457" y="1652" text-anchor="middle" class="label">prior-state</text>
  <text x="457" y="1687" text-anchor="middle" class="label">NMSE</text>

  <rect x="75" y="1620" width="205" height="90" rx="13" class="eval"/>
  <text x="177" y="1660" text-anchor="middle" class="label">state s[t]</text>
  <text x="177" y="1696" text-anchor="middle" class="body">target only</text>

  <path d="M280,1520 L334,1520" class="green-arrow"/>
  <path d="M457,1570 L457,1619" class="gray-arrow"/>
  <path d="M280,1665 L334,1665" class="gray-arrow"/>

  <!-- Exact intervention grid -->
  <text x="985" y="1460" text-anchor="middle" class="section">exact retrained interventions</text>

  <rect x="650" y="1490" width="285" height="95" rx="13" class="action"/>
  <text x="792" y="1528" text-anchor="middle" class="label">no-action</text>
  <text x="792" y="1570" text-anchor="middle" class="math">W_a a[t] = 0</text>

  <rect x="990" y="1490" width="285" height="110" rx="13" class="predictor"/>
  <text x="1132" y="1528" text-anchor="middle" class="label">single-read</text>
  <text x="1132" y="1565" text-anchor="middle" class="body">medium-state</text>
  <text x="1132" y="1595" text-anchor="middle" class="body">read only</text>

  <rect x="650" y="1615" width="285" height="105" rx="13" class="fast"/>
  <text x="792" y="1648" text-anchor="middle" class="label">static</text>
  <text x="792" y="1682" text-anchor="middle" class="math">rho_f = 0</text>
  <text x="792" y="1712" text-anchor="middle" class="math">rho_m = 0</text>

  <rect x="990" y="1615" width="285" height="105" rx="13" class="medium"/>
  <text x="1132" y="1648" text-anchor="middle" class="label">dynamic</text>
  <text x="1132" y="1682" text-anchor="middle" class="math">rho_f = 1</text>
  <text x="1132" y="1712" text-anchor="middle" class="math">rho_m = 1</text>

  <rect x="75" y="1755" width="1200" height="82" rx="12" class="warn"/>
  <text x="675" y="1789" text-anchor="middle" class="label">Native state and reward are evaluation only.</text>
  <text x="675" y="1827" text-anchor="middle" class="body">They never enter encoder, memory, predictor, or training loss.</text>
</svg>
