<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Self-supervised action-conditioned memory for LeWorldModel</title>
  <desc id="desc">Two-panel academic schematic. Panel a shows the compact HACSSM-v8 SAS-PC model flow with fast and medium action-conditioned predict-correct states, joint read, residual fusion, and a short-window LeWorldModel predictor. Panel b shows synchronized observed, action, and clean-coordinate data streams with visible-target self-supervised training and hidden blackout targets excluded.</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B6FB6"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E6812F"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A8F29"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A5AA6"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A9D8F"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <style>
      text { font-family: "DejaVu Sans", "Liberation Sans", Arial, sans-serif; fill: #17202A; }
      .title { font-size: 34px; font-weight: 700; letter-spacing: -0.35px; }
      .subtitle { font-size: 18px; fill: #596574; }
      .panel-title { font-size: 23px; font-weight: 700; }
      .section { font-size: 18px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 600; }
      .body { font-size: 15px; }
      .small { font-size: 13.5px; fill: #4F5B67; }
      .tiny { font-size: 12px; fill: #596574; }
      .equation { font-family: "DejaVu Sans", "Liberation Sans", Arial, sans-serif; font-size: 15px; }
      .panel { fill: #FFFFFF; stroke: #CAD2DC; stroke-width: 1.8; }
      .memory-outline { fill: #FBFCFD; stroke: #98A4B3; stroke-width: 1.7; }
      .obs-box { fill: #E8F1FA; stroke: #3B6FB6; stroke-width: 1.7; }
      .action-box { fill: #FFF1E3; stroke: #E6812F; stroke-width: 1.7; }
      .fast-box { fill: #EAF4D3; stroke: #5A8F29; stroke-width: 1.7; }
      .medium-box { fill: #EEE8FA; stroke: #7A5AA6; stroke-width: 1.7; }
      .teal-box { fill: #E5F5F2; stroke: #2A9D8F; stroke-width: 1.7; }
      .neutral-box { fill: #F4F6F8; stroke: #7A8694; stroke-width: 1.5; }
      .loss-box { fill: #FFF4F2; stroke: #C95D4B; stroke-width: 1.8; }
      .solid-blue { fill: none; stroke: #3B6FB6; stroke-width: 2.4; marker-end: url(#arrow-blue); }
      .solid-orange { fill: none; stroke: #E6812F; stroke-width: 2.4; marker-end: url(#arrow-orange); }
      .solid-green { fill: none; stroke: #5A8F29; stroke-width: 2.4; marker-end: url(#arrow-green); }
      .solid-violet { fill: none; stroke: #7A5AA6; stroke-width: 2.4; marker-end: url(#arrow-violet); }
      .solid-teal { fill: none; stroke: #2A9D8F; stroke-width: 2.4; marker-end: url(#arrow-teal); }
      .target-gray { fill: none; stroke: #6B7280; stroke-width: 2.1; stroke-dasharray: 8 7; marker-end: url(#arrow-gray); }
      .feedback-green { fill: none; stroke: #5A8F29; stroke-width: 2; stroke-dasharray: 5 5; marker-end: url(#arrow-green); }
      .feedback-violet { fill: none; stroke: #7A5AA6; stroke-width: 2; stroke-dasharray: 5 5; marker-end: url(#arrow-violet); }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1000" fill="#FBFCFD"/>

  <text x="900" y="48" text-anchor="middle" class="title">Self-Supervised Action-Conditioned Memory for LeWorldModel</text>
  <text x="900" y="78" text-anchor="middle" class="subtitle">Evidence-backed SAS-PC / HACSSM-v8 flow · adaptive-development architecture, not a confirmation result</text>

  <!-- Panel A -->
  <rect x="42" y="105" width="1060" height="820" rx="16" class="panel"/>
  <text x="72" y="145" class="panel-title">(a) Model and causal state flow</text>
  <text x="1070" y="145" text-anchor="end" class="small">solid arrows: deployed inference</text>

  <!-- Inputs and encoder -->
  <rect x="74" y="178" width="155" height="70" rx="11" class="obs-box"/>
  <text x="151.5" y="207" text-anchor="middle" class="label">observation</text>
  <text x="151.5" y="230" text-anchor="middle" class="body">oₜ</text>

  <rect x="270" y="178" width="145" height="70" rx="11" class="neutral-box"/>
  <text x="342.5" y="207" text-anchor="middle" class="label">frame encoder</text>
  <text x="342.5" y="230" text-anchor="middle" class="body">Eθ</text>

  <rect x="458" y="178" width="128" height="70" rx="11" class="obs-box"/>
  <text x="522" y="207" text-anchor="middle" class="label">latent</text>
  <text x="522" y="230" text-anchor="middle" class="body">zₜ</text>

  <rect x="628" y="178" width="176" height="70" rx="11" class="obs-box"/>
  <text x="716" y="207" text-anchor="middle" class="label">observation map</text>
  <text x="716" y="230" text-anchor="middle" class="body">xₜ = Wₓ zₜ</text>

  <path d="M 229 213 L 270 213" class="solid-blue"/>
  <path d="M 415 213 L 458 213" class="solid-blue"/>
  <path d="M 586 213 L 628 213" class="solid-blue"/>

  <rect x="74" y="280" width="155" height="70" rx="11" class="action-box"/>
  <text x="151.5" y="309" text-anchor="middle" class="label">previous action</text>
  <text x="151.5" y="332" text-anchor="middle" class="body">aₜ₋₁</text>

  <rect x="270" y="280" width="185" height="70" rx="11" class="action-box"/>
  <text x="362.5" y="309" text-anchor="middle" class="label">shared action map</text>
  <text x="362.5" y="332" text-anchor="middle" class="body">Wₐ</text>

  <rect x="500" y="280" width="182" height="70" rx="11" class="action-box"/>
  <text x="591" y="309" text-anchor="middle" class="label">affine update</text>
  <text x="591" y="332" text-anchor="middle" class="body">(dₜ₋₁, vₜ₋₁)</text>

  <path d="M 229 315 L 270 315" class="solid-orange"/>
  <path d="M 455 315 L 500 315" class="solid-orange"/>

  <!-- Memory block -->
  <rect x="72" y="383" width="998" height="326" rx="14" class="memory-outline"/>
  <text x="94" y="413" class="section">Two-state predict–correct memory</text>
  <text x="1048" y="413" text-anchor="end" class="small">state carried across the short predictor window</text>

  <!-- Fast lane -->
  <rect x="102" y="440" width="142" height="72" rx="10" class="fast-box"/>
  <text x="173" y="468" text-anchor="middle" class="label">fast state</text>
  <text x="173" y="491" text-anchor="middle" class="body">mᶠₜ₋₁ · τᶠ=2</text>

  <rect x="292" y="440" width="184" height="72" rx="10" class="fast-box"/>
  <text x="384" y="468" text-anchor="middle" class="label">action prediction</text>
  <text x="384" y="491" text-anchor="middle" class="body">pᶠₜ</text>

  <rect x="532" y="440" width="194" height="72" rx="10" class="fast-box"/>
  <text x="629" y="468" text-anchor="middle" class="label">bounded correction</text>
  <text x="629" y="491" text-anchor="middle" class="body">gᶠₜ · (xₜ − pᶠₜ)</text>

  <rect x="784" y="440" width="142" height="72" rx="10" class="fast-box"/>
  <text x="855" y="468" text-anchor="middle" class="label">posterior</text>
  <text x="855" y="491" text-anchor="middle" class="body">mᶠₜ</text>

  <path d="M 244 476 L 292 476" class="solid-green"/>
  <path d="M 476 476 L 532 476" class="solid-green"/>
  <path d="M 726 476 L 784 476" class="solid-green"/>
  <path d="M 855 440 C 855 420, 173 420, 173 439" class="feedback-green"/>

  <!-- Medium lane -->
  <rect x="102" y="548" width="142" height="72" rx="10" class="medium-box"/>
  <text x="173" y="576" text-anchor="middle" class="label">medium state</text>
  <text x="173" y="599" text-anchor="middle" class="body">mᵐₜ₋₁ · τᵐ=8</text>

  <rect x="292" y="548" width="184" height="72" rx="10" class="medium-box"/>
  <text x="384" y="576" text-anchor="middle" class="label">action prediction</text>
  <text x="384" y="599" text-anchor="middle" class="body">pᵐₜ</text>

  <rect x="532" y="548" width="194" height="72" rx="10" class="medium-box"/>
  <text x="629" y="576" text-anchor="middle" class="label">bounded correction</text>
  <text x="629" y="599" text-anchor="middle" class="body">gᵐₜ · (xₜ − pᵐₜ)</text>

  <rect x="784" y="548" width="142" height="72" rx="10" class="medium-box"/>
  <text x="855" y="576" text-anchor="middle" class="label">posterior</text>
  <text x="855" y="599" text-anchor="middle" class="body">mᵐₜ</text>

  <path d="M 244 584 L 292 584" class="solid-violet"/>
  <path d="M 476 584 L 532 584" class="solid-violet"/>
  <path d="M 726 584 L 784 584" class="solid-violet"/>
  <path d="M 855 620 C 855 641, 173 641, 173 621" class="feedback-violet"/>

  <!-- Shared input fan-outs -->
  <path d="M 591 350 L 591 371 L 384 371 L 384 439" class="solid-orange"/>
  <path d="M 591 371 L 384 371 L 384 547" class="solid-orange"/>
  <path d="M 716 248 L 716 365 L 629 365 L 629 439" class="solid-blue"/>
  <path d="M 716 365 L 629 365 L 629 547" class="solid-blue"/>

  <text x="516" y="666" text-anchor="middle" class="equation">pₜᵏ = mₜ₋₁ᵏ + βₖ tanh(vₜ₋₁ + dₜ₋₁ ⊙ LN(mₜ₋₁ᵏ))</text>
  <text x="516" y="692" text-anchor="middle" class="equation">mₜᵏ = pₜᵏ + βₖ gₜᵏ(xₜ − pₜᵏ),  k ∈ {fast, medium}</text>

  <!-- Read and prediction -->
  <rect x="84" y="758" width="250" height="76" rx="11" class="teal-box"/>
  <text x="209" y="786" text-anchor="middle" class="label">joint RMS read</text>
  <text x="209" y="811" text-anchor="middle" class="small">rₜ = RMSNorm(πᶠmᶠₜ + πᵐmᵐₜ)</text>

  <rect x="370" y="758" width="192" height="76" rx="11" class="teal-box"/>
  <text x="466" y="786" text-anchor="middle" class="label">residual fusion</text>
  <text x="466" y="811" text-anchor="middle" class="body">z̃ₜ = zₜ + Wₒrₜ</text>

  <rect x="598" y="758" width="226" height="76" rx="11" class="neutral-box"/>
  <text x="711" y="786" text-anchor="middle" class="label">short LeWM window</text>
  <text x="711" y="811" text-anchor="middle" class="body">{z̃ₜ₋ₕ₊₁:ₜ, aₜ₋ₕ₊₁:ₜ}</text>

  <rect x="860" y="758" width="178" height="76" rx="11" class="teal-box"/>
  <text x="949" y="786" text-anchor="middle" class="label">predictor Pφ</text>
  <text x="949" y="811" text-anchor="middle" class="body">ẑₜ₊₁</text>

  <polyline points="926,476 1082,476 1082,718 258,718 258,757" fill="none" stroke="#5A8F29" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <polyline points="926,584 1060,584 1060,734 184,734 184,757" fill="none" stroke="#7A5AA6" stroke-width="2.4" marker-end="url(#arrow-violet)"/>
  <path d="M 334 796 L 370 796" class="solid-teal"/>
  <path d="M 562 796 L 598 796" class="solid-teal"/>
  <path d="M 824 796 L 860 796" class="solid-teal"/>
  <polyline points="522,248 522,365 60,365 60,746 466,746 466,757" fill="none" stroke="#3B6FB6" stroke-width="2.4" marker-end="url(#arrow-blue)"/>

  <rect x="626" y="858" width="146" height="46" rx="9" class="action-box"/>
  <text x="699" y="887" text-anchor="middle" class="body">current action aₜ</text>
  <path d="M 699 858 L 699 835" class="solid-orange"/>

  <text x="85" y="884" class="small">Causal streaming · 2D recurrent state</text>
  <text x="85" y="906" class="small">No memory teacher · no recovery loss · no memory-specific auxiliary</text>

  <!-- Panel B -->
  <rect x="1130" y="105" width="628" height="820" rx="16" class="panel"/>
  <text x="1160" y="145" class="panel-title">(b) Self-supervised trajectory training</text>
  <text x="1728" y="172" text-anchor="end" class="small">dashed arrows: target/loss only</text>

  <!-- Timeline labels -->
  <text x="1160" y="220" class="label">observed view</text>
  <text x="1160" y="246" class="small">memory input</text>

  <!-- Observed frames -->
  <g>
    <rect x="1300" y="195" width="70" height="66" rx="8" class="obs-box"/>
    <circle cx="1335" cy="224" r="12" fill="#7EA7D8"/>
    <path d="M1315 248 L1332 233 L1343 242 L1357 229" fill="none" stroke="#3B6FB6" stroke-width="3"/>
    <text x="1335" y="279" text-anchor="middle" class="tiny">t−2</text>

    <rect x="1383" y="195" width="70" height="66" rx="8" class="obs-box"/>
    <circle cx="1418" cy="224" r="12" fill="#7EA7D8"/>
    <path d="M1398 248 L1415 233 L1426 242 L1440 229" fill="none" stroke="#3B6FB6" stroke-width="3"/>
    <text x="1418" y="279" text-anchor="middle" class="tiny">t−1</text>

    <rect x="1466" y="195" width="70" height="66" rx="8" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.6"/>
    <path d="M1478 207 L1524 249 M1524 207 L1478 249" stroke="#8A93A0" stroke-width="4"/>
    <text x="1501" y="279" text-anchor="middle" class="tiny">t</text>

    <rect x="1549" y="195" width="70" height="66" rx="8" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.6"/>
    <path d="M1561 207 L1607 249 M1607 207 L1561 249" stroke="#8A93A0" stroke-width="4"/>
    <text x="1584" y="279" text-anchor="middle" class="tiny">t+1</text>

    <rect x="1632" y="195" width="70" height="66" rx="8" class="obs-box"/>
    <circle cx="1667" cy="224" r="12" fill="#7EA7D8"/>
    <path d="M1647 248 L1664 233 L1675 242 L1689 229" fill="none" stroke="#3B6FB6" stroke-width="3"/>
    <text x="1667" y="279" text-anchor="middle" class="tiny">t+2</text>
  </g>
  <path d="M 1371 228 L 1382 228 M 1454 228 L 1465 228 M 1537 228 L 1548 228 M 1620 228 L 1631 228" stroke="#3B6FB6" stroke-width="2.2"/>
  <text x="1542" y="306" text-anchor="middle" class="small">contiguous blackout / missing observations</text>

  <!-- Action row -->
  <text x="1160" y="354" class="label">actions</text>
  <text x="1160" y="380" class="small">executed controls</text>
  <line x1="1300" y1="365" x2="1702" y2="365" stroke="#E6812F" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <g fill="#FFF1E3" stroke="#E6812F" stroke-width="1.7">
    <circle cx="1376" cy="365" r="22"/><circle cx="1459" cy="365" r="22"/><circle cx="1542" cy="365" r="22"/><circle cx="1625" cy="365" r="22"/>
  </g>
  <g class="body" text-anchor="middle">
    <text x="1376" y="371">aₜ₋₂</text><text x="1459" y="371">aₜ₋₁</text><text x="1542" y="371">aₜ</text><text x="1625" y="371">aₜ₊₁</text>
  </g>

  <!-- Clean coordinate / target row -->
  <text x="1160" y="451" class="label">clean targets</text>
  <text x="1160" y="477" class="small">targets + evaluation</text>

  <g>
    <rect x="1300" y="426" width="70" height="66" rx="8" class="teal-box"/>
    <circle cx="1335" cy="455" r="12" fill="#74BFB6"/>
    <path d="M1315 479 L1332 464 L1343 473 L1357 460" fill="none" stroke="#2A9D8F" stroke-width="3"/>
    <text x="1335" y="510" text-anchor="middle" class="tiny">visible target</text>

    <rect x="1383" y="426" width="70" height="66" rx="8" class="teal-box"/>
    <circle cx="1418" cy="455" r="12" fill="#74BFB6"/>
    <path d="M1398 479 L1415 464 L1426 473 L1440 460" fill="none" stroke="#2A9D8F" stroke-width="3"/>
    <text x="1418" y="510" text-anchor="middle" class="tiny">visible target</text>

    <rect x="1466" y="426" width="70" height="66" rx="8" fill="#F2F3F5" stroke="#A4ABB5" stroke-width="1.5"/>
    <path d="M1478 438 L1524 480 M1524 438 L1478 480" stroke="#B1B7C0" stroke-width="3"/>
    <text x="1501" y="510" text-anchor="middle" class="tiny">eval only</text>

    <rect x="1549" y="426" width="70" height="66" rx="8" fill="#F2F3F5" stroke="#A4ABB5" stroke-width="1.5"/>
    <path d="M1561 438 L1607 480 M1607 438 L1561 480" stroke="#B1B7C0" stroke-width="3"/>
    <text x="1584" y="510" text-anchor="middle" class="tiny">eval only</text>

    <rect x="1632" y="426" width="70" height="66" rx="8" class="teal-box"/>
    <circle cx="1667" cy="455" r="12" fill="#74BFB6"/>
    <path d="M1647 479 L1664 464 L1675 473 L1689 460" fill="none" stroke="#2A9D8F" stroke-width="3"/>
    <text x="1667" y="510" text-anchor="middle" class="tiny">visible target</text>
  </g>

  <!-- Unroll and loss -->
  <rect x="1194" y="555" width="500" height="92" rx="12" class="neutral-box"/>
  <text x="1444" y="586" text-anchor="middle" class="label">causal recurrent unroll</text>
  <text x="1444" y="612" text-anchor="middle" class="body">{zᵒᵇˢ₀:ₜ, a₀:ₜ} → memory states → ẑₜ₊₁</text>
  <text x="1444" y="634" text-anchor="middle" class="small">the deployed recurrence is the training recurrence</text>

  <path d="M 1501 261 L 1501 538 L 1444 538 L 1444 554" class="solid-blue"/>
  <path d="M 1542 388 L 1542 531 L 1480 531 L 1480 554" class="solid-orange"/>

  <rect x="1194" y="702" width="500" height="116" rx="12" class="loss-box"/>
  <text x="1444" y="734" text-anchor="middle" class="label">ordinary visible next-latent prediction</text>
  <text x="1444" y="767" text-anchor="middle" class="equation">Lₚᵣₑd = (1 / |V|) ∑ₜ₊₁∈V ‖ ẑₜ₊₁ − sg(zᶜˡᵉᵃⁿₜ₊₁) ‖²₂</text>
  <text x="1444" y="795" text-anchor="middle" class="small">no task labels · no memory teacher · no hidden blackout target</text>

  <path d="M 1444 647 L 1444 701" class="solid-teal"/>
  <path d="M 1667 492 C 1667 654, 1585 651, 1585 701" class="target-gray"/>
  <text x="1642" y="665" text-anchor="middle" class="tiny">stop-gradient target</text>

  <rect x="1194" y="849" width="500" height="48" rx="9" fill="#FFF9E9" stroke="#D7A928" stroke-width="1.4"/>
  <text x="1444" y="870" text-anchor="middle" class="small">V8 evidence used fixed DINO–PCA coordinates.</text>
  <text x="1444" y="889" text-anchor="middle" class="small">End-to-end LeWM confirmation remains a separate required study.</text>

  <!-- Global legend -->
  <g transform="translate(58,952)">
    <line x1="0" y1="0" x2="42" y2="0" stroke="#3B6FB6" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <text x="56" y="5" class="small">observation / latent</text>
    <line x1="230" y1="0" x2="272" y2="0" stroke="#E6812F" stroke-width="3" marker-end="url(#arrow-orange)"/>
    <text x="286" y="5" class="small">action</text>
    <line x1="385" y1="0" x2="427" y2="0" stroke="#2A9D8F" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <text x="441" y="5" class="small">memory read / prediction</text>
    <line x1="675" y1="0" x2="717" y2="0" stroke="#6B7280" stroke-width="2.6" stroke-dasharray="8 7" marker-end="url(#arrow-gray)"/>
    <text x="731" y="5" class="small">target-only path</text>
    <text x="1692" y="5" text-anchor="end" class="tiny">Timing convention: aₜ maps state t → t+1</text>
  </g>
</svg>
