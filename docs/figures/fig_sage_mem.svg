<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">SAGE-Mem v1 architecture and frozen-host data flow</title>
  <desc id="desc">Editable diagram showing frozen LeWM vector and DINO-WM patch inputs, four interleaved memory half-lives, log-magnitude surprise gating, write-mass confidence, fixed local-regional-global aggregation, a zero-initialized exposure residual, the frozen host, ordered audit reads, and prospective label-free losses.</desc>
  <metadata>Implemented SAGE-Mem v1 carrier with prospective unsealed training contract; 2026-07-08.</metadata>

  <defs>
    <style><![CDATA[
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #17324D; }
      .subtitle { font: 400 13px Inter, Arial, sans-serif; fill: #526674; }
      .section { font: 700 16px Inter, Arial, sans-serif; fill: #17324D; }
      .box-title { font: 700 14px Inter, Arial, sans-serif; fill: #17324D; }
      .body { font: 400 12px Inter, Arial, sans-serif; fill: #273F50; }
      .small { font: 400 10.5px Inter, Arial, sans-serif; fill: #526674; }
      .tiny { font: 400 9.5px Inter, Arial, sans-serif; fill: #607482; }
      .mono { font: 500 11px "IBM Plex Mono", Consolas, monospace; fill: #273F50; }
      .chip { font: 700 10px Inter, Arial, sans-serif; letter-spacing: .4px; }
      .panel { fill: #FFFFFF; stroke: #C7D2D9; stroke-width: 1.2; rx: 10; }
      .frozen { fill: #EAF2F8; stroke: #3F6F91; stroke-width: 1.5; rx: 8; }
      .trainable { fill: #EAF5EE; stroke: #3B7A57; stroke-width: 1.6; rx: 8; }
      .fixed { fill: #FFF1E5; stroke: #B8672B; stroke-width: 1.5; rx: 8; }
      .read { fill: #F1EDF8; stroke: #6C5B8C; stroke-width: 1.5; rx: 8; }
      .neutral { fill: #F5F7F8; stroke: #82929C; stroke-width: 1.2; rx: 8; }
      .loss { fill: #FAFBFC; stroke: #758995; stroke-width: 1.2; rx: 8; }
      .formal { fill: none; stroke: #3B7A57; stroke-width: 1.6; }
      .dev { stroke: #B8672B; stroke-width: 1.4; stroke-dasharray: 6 4; }
      .arrow { fill: none; stroke: #526674; stroke-width: 1.8; marker-end: url(#arrow); }
      .arrow-green { fill: none; stroke: #3B7A57; stroke-width: 2; marker-end: url(#arrow-green); }
      .arrow-purple { fill: none; stroke: #6C5B8C; stroke-width: 1.7; marker-end: url(#arrow-purple); }
      .arrow-dashed { fill: none; stroke: #B8672B; stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrow-orange); }
      .guide { fill: none; stroke: #D9E1E6; stroke-width: 1; }
    ]]></style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#526674"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3B7A57"/>
    </marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6C5B8C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#B8672B"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#17324D" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="#FFFFFF"/>

  <g id="header">
    <text x="40" y="42" class="title">SAGE-Mem v1</text>
    <text x="40" y="65" class="subtitle">Surprise-gated · Age-balanced · Global · Exposure-calibrated Memory</text>
    <text x="40" y="84" class="subtitle">Implemented parameter-matched carrier · prospective host integration and label-free formal objective</text>

    <g id="legend" transform="translate(1035,25)">
      <rect x="0" y="0" width="525" height="56" class="neutral"/>
      <rect x="16" y="14" width="18" height="12" class="frozen"/><text x="41" y="24" class="small">frozen host</text>
      <rect x="128" y="14" width="18" height="12" class="trainable"/><text x="153" y="24" class="small">trainable</text>
      <rect x="240" y="14" width="18" height="12" class="fixed"/><text x="265" y="24" class="small">fixed / parameter-free</text>
      <rect x="410" y="14" width="18" height="12" class="read"/><text x="435" y="24" class="small">audit read</text>
      <line x1="16" y1="40" x2="45" y2="40" class="arrow-dashed"/><text x="53" y="44" class="small">development-to-seal detail</text>
      <line x1="270" y1="40" x2="299" y2="40" class="arrow-green"/><text x="307" y="44" class="small">formal data / residual flow</text>
    </g>
  </g>

  <!-- Input contracts -->
  <g id="input-contracts" transform="translate(40,112)">
    <rect x="0" y="0" width="330" height="505" class="panel" filter="url(#soft-shadow)"/>
    <text x="20" y="30" class="section">1 · Frozen input contracts</text>

    <g id="lewm-path">
      <rect x="20" y="52" width="290" height="130" class="frozen"/>
      <text x="36" y="78" class="box-title">LeWM vector path</text>
      <text x="36" y="101" class="body">RGB observation → frozen encoder</text>
      <text x="36" y="124" class="mono">P = 1   D = 192   A = 10</text>
      <text x="36" y="147" class="body">one causal vector stream</text>
      <rect x="222" y="68" width="70" height="22" fill="#3F6F91" rx="11"/>
      <text x="257" y="83" text-anchor="middle" class="chip" fill="#FFFFFF">FROZEN</text>
    </g>

    <g id="dinowm-path">
      <rect x="20" y="202" width="290" height="160" class="frozen"/>
      <text x="36" y="228" class="box-title">DINO-WM patch path</text>
      <text x="36" y="251" class="body">RGB → frozen patch encoder</text>
      <text x="36" y="274" class="mono">P = 196 (14×14)   D = 384</text>
      <text x="36" y="297" class="mono">A = 10   shared weights over P</text>
      <text x="36" y="320" class="body">action / proprio channels unchanged</text>
      <g transform="translate(227,220)" fill="#A9C3D5" stroke="#3F6F91" stroke-width=".7">
        <rect x="0" y="0" width="13" height="13"/><rect x="17" y="0" width="13" height="13"/><rect x="34" y="0" width="13" height="13"/><rect x="51" y="0" width="13" height="13"/>
        <rect x="0" y="17" width="13" height="13"/><rect x="17" y="17" width="13" height="13"/><rect x="34" y="17" width="13" height="13"/><rect x="51" y="17" width="13" height="13"/>
        <rect x="0" y="34" width="13" height="13"/><rect x="17" y="34" width="13" height="13"/><rect x="34" y="34" width="13" height="13"/><rect x="51" y="34" width="13" height="13"/>
        <rect x="0" y="51" width="13" height="13"/><rect x="17" y="51" width="13" height="13"/><rect x="34" y="51" width="13" height="13"/><rect x="51" y="51" width="13" height="13"/>
      </g>
    </g>

    <g id="shared-input-invariants">
      <rect x="20" y="382" width="290" height="101" class="neutral"/>
      <text x="36" y="408" class="box-title">Shared invariants</text>
      <text x="36" y="431" class="body">• same data, actions, endpoints</text>
      <text x="36" y="452" class="body">• pre-decision causal state timing</text>
      <text x="36" y="473" class="body">• frozen hashes before / after cells</text>
    </g>
  </g>

  <!-- Core SAGE-Mem -->
  <g id="sage-core" transform="translate(400,112)">
    <rect x="0" y="0" width="650" height="505" class="panel" filter="url(#soft-shadow)"/>
    <text x="20" y="30" class="section">2 · Implemented SAGE-Mem carrier</text>
    <rect x="497" y="12" width="130" height="23" fill="#3B7A57" rx="11"/>
    <text x="562" y="28" text-anchor="middle" class="chip" fill="#FFFFFF">TESTED CORE</text>

    <g id="prior-predict">
      <rect x="20" y="54" width="604" height="76" class="trainable"/>
      <text x="36" y="78" class="box-title">1 · Action-predicted causal prior</text>
      <text x="36" y="101" class="mono">m⁻ₜ = Λ ⊙ mₜ₋₁ + B aₜ₋₁</text>
      <text x="351" y="101" class="small">emit prior before current zₜ · action term broadcasts over patches</text>
      <text x="36" y="121" class="tiny">native coordinates · Wₓ = Wg = I, B = 0, ρ = 0 at initialization · recurrence state stays fp32</text>
    </g>

    <g id="multiscale-bands">
      <rect x="20" y="150" width="604" height="108" class="fixed"/>
      <text x="36" y="174" class="box-title">2 · Fixed multiscale prediction</text>
      <text x="36" y="195" class="small">Λⱼ = 2⁻¹ᐟτⱼ · τⱼ assigned round-robin over channels (j mod 4)</text>
      <g transform="translate(36,211)">
        <rect x="0" y="0" width="126" height="29" fill="#F7C59F" stroke="#B8672B" rx="4"/><text x="63" y="19" text-anchor="middle" class="mono">τ = 4</text>
        <rect x="142" y="0" width="126" height="29" fill="#F3B77F" stroke="#B8672B" rx="4"/><text x="205" y="19" text-anchor="middle" class="mono">τ = 8</text>
        <rect x="284" y="0" width="126" height="29" fill="#E8A368" stroke="#B8672B" rx="4"/><text x="347" y="19" text-anchor="middle" class="mono">τ = 16</text>
        <rect x="426" y="0" width="126" height="29" fill="#D98B4B" stroke="#B8672B" rx="4"/><text x="489" y="19" text-anchor="middle" class="mono" fill="#FFFFFF">τ = 64</text>
      </g>
    </g>

    <g id="surprise-update">
      <rect x="20" y="278" width="604" height="116" class="trainable"/>
      <text x="36" y="302" class="box-title">3 · Surprise-gated write + evidence mass</text>
      <text x="36" y="326" class="mono">eₜ = Wₓ zₜ − m⁻ₜ      sₜ = log(1 + |Wg eₜ|)</text>
      <text x="36" y="349" class="mono">gₜ = σ(4 (sₜ − θ))</text>
      <text x="36" y="372" class="mono">mₜ = m⁻ₜ + gₜ ⊙ eₜ      qₜ = 2⁻¹ᐟ⁶⁴ qₜ₋₁ + mean(gₜ)</text>
      <text x="36" y="389" class="tiny">write confidence c(q) = 1 − exp(−q/4) · no observation write during imagination</text>
    </g>

    <g id="aggregation-exposure">
      <rect x="20" y="414" width="270" height="70" class="fixed"/>
      <text x="36" y="438" class="box-title">4a · Fixed spatial exposure</text>
      <text x="36" y="459" class="mono">.50 local + .25 region + .25 global</text>
      <text x="36" y="477" class="tiny">2×2 regions on 14×14 · P=1 identity</text>

      <rect x="312" y="414" width="312" height="70" class="trainable"/>
      <text x="328" y="438" class="box-title">4b · Zero-init host residual</text>
      <text x="328" y="459" class="mono">z̃ₜ = zₜ + c(qₜ) ρ ⊙ Agg(mₜ)</text>
      <text x="328" y="477" class="tiny">diagonal read keeps FLOPs matched · prior is pre-zₜ</text>
    </g>

    <path d="M322,130 V150" class="arrow"/>
    <path d="M322,258 V278" class="arrow"/>
    <path d="M170,394 V414" class="arrow"/>
    <path d="M290,449 H312" class="arrow-green"/>
  </g>

  <!-- Frozen host and reads -->
  <g id="host-and-reads" transform="translate(1080,112)">
    <rect x="0" y="0" width="480" height="505" class="panel" filter="url(#soft-shadow)"/>
    <text x="20" y="30" class="section">3 · Frozen host and audit reads</text>

    <g id="frozen-host">
      <rect x="20" y="54" width="440" height="166" class="frozen"/>
      <text x="38" y="80" class="box-title">Released short-context host</text>
      <text x="38" y="104" class="body">residual fusion → native context assembly</text>
      <rect x="38" y="122" width="174" height="52" class="frozen"/>
      <text x="125" y="144" text-anchor="middle" class="body">frozen predictor</text>
      <text x="125" y="162" text-anchor="middle" class="small">actions + proprio unchanged</text>
      <rect x="254" y="122" width="174" height="52" class="frozen"/>
      <text x="341" y="144" text-anchor="middle" class="body">host output yₜ</text>
      <text x="341" y="162" text-anchor="middle" class="small">next-feature target / read</text>
      <path d="M212,148 H254" class="arrow"/>
      <rect x="334" y="68" width="92" height="22" fill="#3F6F91" rx="11"/>
      <text x="380" y="83" text-anchor="middle" class="chip" fill="#FFFFFF">HASHED</text>
    </g>

    <g id="audit-reads">
      <rect x="20" y="245" width="440" height="228" class="neutral"/>
      <text x="38" y="272" class="box-title">Ordered reads — never collapse into one score</text>

      <rect x="38" y="291" width="126" height="72" class="read"/>
      <text x="101" y="315" text-anchor="middle" class="box-title">Prior</text>
      <text x="101" y="337" text-anchor="middle" class="mono">c(q⁻)ρ⊙Agg(m⁻)</text>
      <text x="101" y="355" text-anchor="middle" class="tiny">storage diagnostic</text>

      <rect x="177" y="291" width="126" height="72" class="read"/>
      <text x="240" y="315" text-anchor="middle" class="box-title">Output</text>
      <text x="240" y="337" text-anchor="middle" class="body">frozen yₜ</text>
      <text x="240" y="355" text-anchor="middle" class="tiny">primary retention</text>

      <rect x="316" y="291" width="126" height="72" class="read"/>
      <text x="379" y="315" text-anchor="middle" class="box-title">Use</text>
      <text x="379" y="337" text-anchor="middle" class="body">fixed consumer</text>
      <text x="379" y="355" text-anchor="middle" class="tiny">eligible execution only</text>

      <path d="M164,327 H177" class="arrow-purple"/>
      <path d="M303,327 H316" class="arrow-purple"/>

      <text x="38" y="397" class="body">Formal contrasts at age 15:</text>
      <text x="38" y="419" class="small">full &gt; comparator · no state · reset</text>
      <text x="38" y="440" class="small">full &gt; state ablation · exposure ablation</text>
      <text x="38" y="461" class="small">prior-only improvement = exposure failure</text>
    </g>
  </g>

  <!-- Cross-panel flow -->
  <g id="cross-panel-arrows">
    <path d="M370,215 H400" class="arrow"/>
    <path d="M370,365 C385,365 385,250 400,250" class="arrow"/>
    <text x="376" y="198" class="tiny">zₜ, aₜ₋₁</text>
    <path d="M1050,561 C1064,561 1064,210 1080,210" class="arrow-green"/>
    <text x="1058" y="382" class="tiny" transform="rotate(-90 1058 382)">exposed residual</text>
    <path d="M1050,190 C1067,190 1067,403 1118,403" class="arrow-purple"/>
    <text x="1061" y="327" class="tiny" transform="rotate(-90 1061 327)">pre-observation prior</text>
    <path d="M1421,260 V403" class="arrow-purple"/>
  </g>

  <!-- Training objectives -->
  <g id="training-objectives" transform="translate(40,655)">
    <rect x="0" y="0" width="1520" height="282" class="panel" filter="url(#soft-shadow)"/>
    <text x="20" y="31" class="section">4 · Prospective label-free objective and fail-closed health constraints</text>
    <text x="20" y="52" class="small">Unsealed host integration: task labels, cue classes, goals, rewards, probe targets, and formal outcomes never enter optimization.</text>

    <g id="loss-next" transform="translate(20,72)">
      <rect x="0" y="0" width="345" height="102" class="loss"/>
      <text x="16" y="25" class="box-title">Native next-feature loss</text>
      <text x="16" y="49" class="mono">L_next = MSE(y_full, z*ₜ₊₁)</text>
      <text x="16" y="71" class="small">same frozen targets and context</text>
      <text x="16" y="91" class="small">hard ratio ≤ 1.02 × native</text>
    </g>

    <g id="loss-retention" transform="translate(385,72)">
      <rect x="0" y="0" width="345" height="102" class="loss dev"/>
      <text x="16" y="25" class="box-title">Age-balanced event sketch</text>
      <text x="16" y="49" class="mono">L_ret · δ ∈ {4, 8, 15}</text>
      <text x="16" y="71" class="small">detached surprise events · fixed Q</text>
      <text x="16" y="91" class="small">equal weight per evidence age</text>
    </g>

    <g id="loss-exposure" transform="translate(750,72)">
      <rect x="0" y="0" width="345" height="102" class="loss dev"/>
      <text x="16" y="25" class="box-title">Host-output exposure sketch</text>
      <text x="16" y="49" class="mono">L_exp = ‖Q y − sg(Q r⁻)‖²</text>
      <text x="16" y="71" class="small">align retained and exposed coordinates</text>
      <text x="16" y="91" class="small">loss reduction is not a success gate</text>
    </g>

    <g id="loss-reset" transform="translate(1115,72)">
      <rect x="0" y="0" width="385" height="102" class="loss"/>
      <text x="16" y="25" class="box-title">Reset-safe native distillation</text>
      <text x="16" y="49" class="mono">L_reset = ‖y_reset − sg(y_native)‖²</text>
      <text x="16" y="71" class="small">random legal contexts · weight 0.1</text>
      <text x="16" y="91" class="small">reset/full MSE health target ≤ 1.25</text>
    </g>

    <g id="objective-footer">
      <rect x="20" y="194" width="985" height="62" class="trainable"/>
      <text x="38" y="219" class="mono">L = L_next + λ_ret L_ret + λ_exp L_exp + 0.1 L_reset</text>
      <text x="38" y="242" class="small">development grid: λ_ret, λ_exp ∈ {0.1, 0.25} · 3 seeds · final choice sealed before 10 fresh formal seeds</text>

      <rect x="1025" y="194" width="475" height="62" class="neutral"/>
      <text x="1043" y="218" class="box-title">Exact trainable count</text>
      <text x="1043" y="241" class="mono">D(2D + A + 2): 76,032 LeWM · 299,520 DINO</text>
    </g>
  </g>

</svg>
